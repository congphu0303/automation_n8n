version: "3.8"

services:
  # ─────────────────────────────────────
  # Nginx Reverse Proxy
  # ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - approval_network

  # ─────────────────────────────────────
  # Backend - Node.js / Express API
  # ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: approval_backend
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
    networks:
      - approval_network

  # ─────────────────────────────────────
  # Frontend - Express + Static HTML
  # ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: approval_frontend
    restart: always
    ports:
      - "3000:3000"
    networks:
      - approval_network

networks:
  approval_network:
    driver: bridge
