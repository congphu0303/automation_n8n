<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Bookings - ApproveHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body class="bg-zinc-100 font-sans">

  <div class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-60 bg-zinc-900 flex flex-col shrink-0">
      <div class="px-6 py-5 border-b border-zinc-800">
        <h1 class="text-white text-lg font-bold tracking-tight">
          Approve<span class="text-blue-400">Hub</span>
        </h1>
        <p class="text-zinc-500 text-xs mt-0.5">Internal System</p>
      </div>

      <nav class="flex-1 px-3 py-4 space-y-1">
        <a href="index.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
          <i class="fa-solid fa-grip text-base w-5"></i> Dashboard
        </a>
        <a href="leave.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
          <i class="fa-solid fa-calendar-check text-base w-5"></i> Leave Request
        </a>
        <a href="approvals.html" id="navApprovals" class="hidden flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
          <i class="fa-solid fa-clipboard-check text-base w-5"></i> Approvals
        </a>
        <div class="my-2 border-t border-zinc-800"></div>
        <a href="rooms.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
          <i class="fa-solid fa-door-open text-base w-5"></i> Meeting Rooms
        </a>
        <a href="book-room.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
          <i class="fa-solid fa-calendar-plus text-base w-5"></i> Book Room
        </a>
        <a href="booking-dashboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium bg-blue-600 text-white">
          <i class="fa-solid fa-list text-base w-5"></i> My Bookings
        </a>
        <a href="meeting-approvals.html" id="navMeetingApprovals" class="hidden flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
          <i class="fa-solid fa-user-check text-base w-5"></i> Room Approvals
        </a>
      </nav>

      <div class="px-3 py-4 border-t border-zinc-800">
        <a href="#" id="logoutBtn" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
          <i class="fa-solid fa-right-from-bracket text-base w-5"></i> Sign Out
        </a>
      </div>
    </aside>

    <!-- Main Column -->
    <div class="flex flex-col flex-1 overflow-hidden">

      <!-- Header -->
      <header class="h-16 bg-white border-b border-zinc-200 flex items-center px-6 gap-4 shrink-0 shadow-sm">
        <div class="flex-1"></div>
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-xs font-bold" id="avatar"></div>
          <div class="text-left hidden sm:block">
            <p class="text-sm font-semibold text-zinc-800 leading-none" id="userName"></p>
            <p class="text-xs text-zinc-400 mt-0.5" id="userRole"></p>
          </div>
        </div>
      </header>

      <!-- Content -->
      <main class="flex-1 overflow-auto p-8">
        <div class="max-w-6xl mx-auto">
          <div class="flex items-center justify-between mb-6">
            <div>
              <h2 class="text-2xl font-bold text-zinc-900">My Bookings</h2>
              <p class="text-zinc-500 mt-1 text-sm">Track your meeting room reservations.</p>
            </div>
            <a href="book-room.html"
              class="px-5 py-2.5 text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 rounded-xl transition-colors flex items-center gap-2 shadow-sm">
              <i class="fa-solid fa-plus text-xs"></i> New Booking
            </a>
          </div>

          <!-- Stats -->
          <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
            <div class="bg-white rounded-xl border border-zinc-200 p-5 shadow-sm">
              <p class="text-xs font-medium text-zinc-400 uppercase tracking-wide">Total Bookings</p>
              <p class="text-3xl font-bold text-zinc-900 mt-2" id="statTotal">0</p>
            </div>
            <div class="bg-white rounded-xl border border-zinc-200 p-5 shadow-sm">
              <p class="text-xs font-medium text-zinc-400 uppercase tracking-wide">Pending</p>
              <p class="text-3xl font-bold text-yellow-500 mt-2" id="statPending">0</p>
            </div>
            <div class="bg-white rounded-xl border border-zinc-200 p-5 shadow-sm">
              <p class="text-xs font-medium text-zinc-400 uppercase tracking-wide">Approved</p>
              <p class="text-3xl font-bold text-green-500 mt-2" id="statApproved">0</p>
            </div>
          </div>

          <!-- Tabs -->
          <div class="flex gap-2 mb-6">
            <button id="tabAll" class="px-4 py-2 text-sm font-medium rounded-lg bg-zinc-200 text-zinc-600 hover:bg-zinc-300">All</button>
            <button id="tabPending" class="px-4 py-2 text-sm font-medium rounded-lg bg-blue-600 text-white">Pending</button>
            <button id="tabApproved" class="px-4 py-2 text-sm font-medium rounded-lg bg-zinc-200 text-zinc-600 hover:bg-zinc-300">Approved</button>
            <button id="tabRejected" class="px-4 py-2 text-sm font-medium rounded-lg bg-zinc-200 text-zinc-600 hover:bg-zinc-300">Rejected</button>
          </div>

          <!-- Loading -->
          <div id="loadingState" class="text-center py-16">
            <i class="fa-solid fa-spinner fa-spin text-2xl text-zinc-400"></i>
            <p class="text-zinc-400 text-sm mt-3">Loading bookings...</p>
          </div>

          <!-- Empty -->
          <div id="emptyState" class="hidden text-center py-16 bg-white rounded-xl border border-zinc-200">
            <i class="fa-solid fa-calendar-xmark text-4xl text-zinc-300 mb-3"></i>
            <p class="text-zinc-500 font-medium">No bookings found</p>
            <a href="book-room.html" class="text-blue-600 text-sm mt-2 inline-block hover:underline">Book a room →</a>
          </div>

          <!-- Bookings List -->
          <div id="bookingsList" class="hidden space-y-4"></div>
        </div>
      </main>

    </div>
  </div>

  <script>
    const API_URL = "http://localhost:3001/api";

    const token = localStorage.getItem("token");
    const user = JSON.parse(localStorage.getItem("user") || "{}");
    if (!token) { window.location.href = "login.html"; }

    document.getElementById("avatar").textContent = user.name ? user.name.slice(0, 2).toUpperCase() : "??";
    document.getElementById("userName").textContent = user.name || "Guest";
    document.getElementById("userRole").textContent = { employee: "Employee", manager: "Manager", hr: "HR" }[user.role] || "";

    if (user.role === "manager") {
      document.getElementById("navMeetingApprovals").classList.remove("hidden");
      document.getElementById("navMeetingApprovals").classList.add("flex");
    }

    const statusBadge = (status) => {
      const map = {
        pending: { bg: "bg-yellow-100", text: "text-yellow-700", label: "Pending", icon: "fa-clock" },
        approved: { bg: "bg-green-100", text: "text-green-700", label: "Approved", icon: "fa-check" },
        rejected: { bg: "bg-red-100", text: "text-red-700", label: "Rejected", icon: "fa-xmark" },
        cancelled: { bg: "bg-zinc-100", text: "text-zinc-500", label: "Cancelled", icon: "fa-ban" },
      };
      const s = map[status] || map.pending;
      return `<span class="px-2.5 py-1 text-xs font-semibold rounded-full ${s.bg} ${s.text} flex items-center gap-1 w-fit">
        <i class="fa-solid ${s.icon} text-xs"></i>${s.label}</span>`;
    };

    let currentTab = "pending";
    let allBookings = [];

    async function loadBookings() {
      document.getElementById("loadingState").classList.remove("hidden");
      document.getElementById("bookingsList").classList.add("hidden");
      document.getElementById("emptyState").classList.add("hidden");

      try {
        const res = await fetch(`${API_URL}/bookings`, {
          headers: { Authorization: `Bearer ${token}` },
        });

        document.getElementById("loadingState").classList.add("hidden");

        if (!res.ok) {
          document.getElementById("emptyState").classList.remove("hidden");
          document.querySelector("#emptyState p").textContent = "Failed to load bookings.";
          return;
        }

        allBookings = await res.json();
        renderBookings();
      } catch (err) {
        document.getElementById("loadingState").classList.add("hidden");
        document.getElementById("emptyState").classList.remove("hidden");
        document.querySelector("#emptyState p").textContent = "Cannot connect to server.";
      }
    }

    function renderBookings() {
      const filtered = allBookings.filter(b => {
        if (currentTab === "all") return true;
        return b.status === currentTab;
      });

      const statTotal = document.getElementById("statTotal");
      const statPending = document.getElementById("statPending");
      const statApproved = document.getElementById("statApproved");

      statTotal.textContent = allBookings.length;
      statPending.textContent = allBookings.filter(b => b.status === "pending").length;
      statApproved.textContent = allBookings.filter(b => b.status === "approved").length;

      const container = document.getElementById("bookingsList");
      const empty = document.getElementById("emptyState");

      if (filtered.length === 0) {
        container.classList.add("hidden");
        empty.classList.remove("hidden");
        empty.querySelector("p").textContent = "No bookings in this category.";
        return;
      }

      empty.classList.add("hidden");
      container.classList.remove("hidden");

      container.innerHTML = filtered.map(b => `
        <div class="bg-white rounded-xl border border-zinc-200 shadow-sm p-6 hover:shadow-md transition-shadow">
          <div class="flex items-start justify-between gap-4">
            <div class="flex items-start gap-4">
              <div class="w-12 h-12 rounded-xl bg-blue-100 flex items-center justify-center shrink-0">
                <i class="fa-solid fa-door-open text-blue-600 text-lg"></i>
              </div>
              <div>
                <div class="flex items-center gap-3 mb-1">
                  <span class="text-xs font-mono bg-zinc-100 text-zinc-600 px-2 py-0.5 rounded">${b.booking_id}</span>
                  ${statusBadge(b.status)}
                </div>
                <h4 class="font-semibold text-zinc-800 mt-1">${b.room_name}</h4>
                <div class="flex flex-wrap gap-x-6 gap-y-1 mt-2 text-sm text-zinc-600">
                  <span><i class="fa-solid fa-calendar mr-2 text-zinc-400"></i>${b.meeting_date}</span>
                  <span><i class="fa-solid fa-clock mr-2 text-zinc-400"></i>${b.start_time} – ${b.end_time}</span>
                  <span><i class="fa-solid fa-users mr-2 text-zinc-400"></i>${b.attendees} attendees</span>
                </div>
                <p class="text-sm text-zinc-500 mt-2">
                  <i class="fa-solid fa-pen mr-1 text-zinc-400"></i>${b.purpose}
                </p>
              </div>
            </div>
            <div class="text-right shrink-0">
              <p class="text-xs text-zinc-400">${new Date(b.createdAt).toLocaleDateString()}</p>
              ${b.manager_status !== "pending" ? `
                <p class="text-xs mt-1 ${b.manager_status === "approved" ? "text-green-600" : "text-red-600"}">
                  <i class="fa-solid ${b.manager_status === "approved" ? "fa-check" : "fa-xmark"} mr-1"></i>
                  Manager ${b.manager_status === "approved" ? "approved" : "rejected"}
                </p>
              ` : ""}
            </div>
          </div>
        </div>
      `).join("");
    }

    // Tabs
    ["All", "Pending", "Approved", "Rejected"].forEach(tab => {
      const btn = document.getElementById(`tab${tab}`);
      btn.addEventListener("click", () => {
        currentTab = tab.toLowerCase();
        document.querySelectorAll("[id^=tab]").forEach(b => {
          b.className = "px-4 py-2 text-sm font-medium rounded-lg bg-zinc-200 text-zinc-600 hover:bg-zinc-300";
        });
        btn.className = "px-4 py-2 text-sm font-medium rounded-lg bg-blue-600 text-white";
        renderBookings();
      });
    });

    loadBookings();

    document.getElementById("logoutBtn").addEventListener("click", () => {
      localStorage.clear();
      window.location.href = "login.html";
    });
  </script>

</body>
</html>
