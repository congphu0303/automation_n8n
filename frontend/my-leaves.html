<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đơn nghỉ phép - ApproveHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body class="bg-zinc-100 font-sans">

  <div class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <div id="appSidebar"></div>

    <!-- Main Column -->
    <div class="flex flex-col flex-1 overflow-hidden">

      <!-- Header -->
      <header class="h-16 bg-white border-b border-zinc-200 flex items-center px-6 gap-4 shrink-0 shadow-sm">
        <div class="flex-1"></div>
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-xs font-bold" id="avatar"></div>
          <div class="text-left hidden sm:block">
            <p class="text-sm font-semibold text-zinc-800 leading-none" id="userName"></p>
            <p class="text-xs text-zinc-400 mt-0.5" id="userRole"></p>
          </div>
          <button id="logoutBtn" class="ml-2 px-3 py-1.5 text-xs font-medium text-zinc-500 hover:text-zinc-800 hover:bg-zinc-100 rounded-lg transition-colors">
            <i class="fa-solid fa-right-from-bracket mr-1"></i>Đăng xuất
          </button>
        </div>
      </header>

      <!-- Loading overlay -->
      <div id="loadingOverlay" class="fixed inset-0 bg-zinc-100 flex items-center justify-center z-50">
        <div class="text-center">
          <i class="fa-solid fa-spinner fa-spin text-3xl text-blue-500 mb-3"></i>
          <p class="text-sm text-zinc-400">Đang tải...</p>
        </div>
      </div>

      <!-- Content -->
      <main class="flex-1 overflow-auto p-8">
        <div class="max-w-6xl mx-auto">

          <div class="flex items-center justify-between mb-6">
            <div>
              <h2 class="text-2xl font-bold text-zinc-900">Đơn nghỉ phép của tôi</h2>
              <p class="text-zinc-500 mt-1 text-sm">Theo dõi và quản lý đơn xin nghỉ phép.</p>
            </div>
            <a href="leave.html"
              class="px-5 py-2.5 text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 rounded-xl transition-colors flex items-center gap-2 shadow-sm">
              <i class="fa-solid fa-plus text-xs"></i> Tạo đơn mới
            </a>
          </div>

          <!-- Tabs -->
          <div class="flex gap-2 mb-6 flex-wrap">
            <button id="tabAll" class="px-4 py-2 text-sm font-medium rounded-lg bg-blue-600 text-white">Tất cả</button>
            <button id="tabPending" class="px-4 py-2 text-sm font-medium rounded-lg bg-zinc-200 text-zinc-600 hover:bg-zinc-300">Chờ duyệt</button>
            <button id="tabApproved" class="px-4 py-2 text-sm font-medium rounded-lg bg-zinc-200 text-zinc-600 hover:bg-zinc-300">Đã duyệt</button>
            <button id="tabRejected" class="px-4 py-2 text-sm font-medium rounded-lg bg-zinc-200 text-zinc-600 hover:bg-zinc-300">Từ chối</button>
            <button id="tabCancelled" class="px-4 py-2 text-sm font-medium rounded-lg bg-zinc-200 text-zinc-600 hover:bg-zinc-300">Đã hủy</button>
          </div>

          <!-- Thống kê -->
          <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white rounded-xl border border-zinc-200 p-4">
              <p class="text-xs text-zinc-500 uppercase tracking-wide">Tổng đơn</p>
              <p class="text-2xl font-bold text-zinc-800 mt-1" id="statTotal">0</p>
            </div>
            <div class="bg-white rounded-xl border border-zinc-200 p-4">
              <p class="text-xs text-zinc-500 uppercase tracking-wide">Đang chờ</p>
              <p class="text-2xl font-bold text-yellow-600 mt-1" id="statPending">0</p>
            </div>
            <div class="bg-white rounded-xl border border-zinc-200 p-4">
              <p class="text-xs text-zinc-500 uppercase tracking-wide">Đã duyệt</p>
              <p class="text-2xl font-bold text-green-600 mt-1" id="statApproved">0</p>
            </div>
            <div class="bg-white rounded-xl border border-zinc-200 p-4">
              <p class="text-xs text-zinc-500 uppercase tracking-wide">Đã từ chối</p>
              <p class="text-2xl font-bold text-red-600 mt-1" id="statRejected">0</p>
            </div>
          </div>

          <!-- Loading (Skeleton) -->
          <div id="loadingState" class="space-y-4">
            <!-- Skeleton card 1 -->
            <div class="bg-white rounded-xl border border-zinc-200 p-6">
              <div class="flex items-start justify-between gap-4">
                <div class="flex-1 space-y-3">
                  <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-zinc-200 animate-pulse"></div>
                    <div class="space-y-2">
                      <div class="h-4 w-32 bg-zinc-200 rounded animate-pulse"></div>
                      <div class="h-3 w-48 bg-zinc-100 rounded"></div>
                    </div>
                  </div>
                  <div class="flex gap-2">
                    <div class="h-6 w-20 bg-zinc-200 rounded-full animate-pulse"></div>
                    <div class="h-6 w-24 bg-zinc-200 rounded-full animate-pulse"></div>
                    <div class="h-6 w-16 bg-zinc-200 rounded-full animate-pulse"></div>
                  </div>
                  <div class="space-y-2">
                    <div class="h-4 w-64 bg-zinc-100 rounded"></div>
                    <div class="h-4 w-40 bg-zinc-100 rounded"></div>
                  </div>
                </div>
              </div>
            </div>
            <!-- Skeleton card 2 -->
            <div class="bg-white rounded-xl border border-zinc-200 p-6">
              <div class="flex items-start justify-between gap-4">
                <div class="flex-1 space-y-3">
                  <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-zinc-200 animate-pulse"></div>
                    <div class="space-y-2">
                      <div class="h-4 w-36 bg-zinc-200 rounded animate-pulse"></div>
                      <div class="h-3 w-40 bg-zinc-100 rounded"></div>
                    </div>
                  </div>
                  <div class="flex gap-2">
                    <div class="h-6 w-20 bg-zinc-200 rounded-full animate-pulse"></div>
                  </div>
                  <div class="space-y-2">
                    <div class="h-4 w-56 bg-zinc-100 rounded"></div>
                    <div class="h-4 w-48 bg-zinc-100 rounded"></div>
                  </div>
                </div>
              </div>
            </div>
            <!-- Skeleton card 3 -->
            <div class="bg-white rounded-xl border border-zinc-200 p-6">
              <div class="flex items-start justify-between gap-4">
                <div class="flex-1 space-y-3">
                  <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-zinc-200 animate-pulse"></div>
                    <div class="space-y-2">
                      <div class="h-4 w-28 bg-zinc-200 rounded animate-pulse"></div>
                      <div class="h-3 w-52 bg-zinc-100 rounded"></div>
                    </div>
                  </div>
                  <div class="flex gap-2">
                    <div class="h-6 w-20 bg-zinc-200 rounded-full animate-pulse"></div>
                    <div class="h-6 w-24 bg-zinc-200 rounded-full animate-pulse"></div>
                  </div>
                  <div class="space-y-2">
                    <div class="h-4 w-48 bg-zinc-100 rounded"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Empty -->
          <div id="emptyState" class="hidden text-center py-16 bg-white rounded-xl border border-zinc-200">
            <i class="fa-solid fa-calendar-xmark text-4xl text-zinc-300 mb-3"></i>
            <p class="text-zinc-500 font-medium">Chưa có đơn nghỉ phép nào</p>
            <a href="leave.html" class="text-blue-600 text-sm mt-2 inline-block hover:underline">Tạo đơn nghỉ phép mới →</a>
          </div>

          <!-- Requests List -->
          <div id="requestsList" class="hidden space-y-4"></div>
        </div>
      </main>

    </div>
  </div>

  <!-- Confirm Modal -->
  <div id="confirmModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-xl shadow-xl p-6 max-w-md w-full mx-4">
      <h3 class="text-lg font-semibold text-zinc-900 mb-2" id="modalTitle">Xác nhận</h3>
      <p class="text-sm text-zinc-600 mb-6" id="modalMessage">Bạn có chắc chắn?</p>
      <div class="flex justify-end gap-3">
        <button id="modalCancelBtn" class="px-4 py-2 text-sm font-medium text-zinc-600 hover:bg-zinc-100 rounded-lg transition-colors">Hủy</button>
        <button id="modalConfirmBtn" class="px-4 py-2 text-sm font-medium text-white bg-red-600 hover:bg-red-700 rounded-lg transition-colors">Xác nhận</button>
      </div>
    </div>
  </div>

  <!-- Return Early Modal -->
  <div id="returnEarlyModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-xl shadow-xl p-6 max-w-md w-full mx-4">
      <h3 class="text-lg font-semibold text-zinc-900 mb-4"><i class="fa-solid fa-calendar-check mr-2 text-blue-500"></i>Về sớm</h3>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-zinc-700 mb-1">Ngày về thực tế</label>
          <input type="date" id="returnDateInput" class="w-full px-3 py-2 border border-zinc-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
        </div>
        <div class="flex justify-end gap-3 mt-6">
          <button id="returnEarlyCancelBtn" class="px-4 py-2 text-sm font-medium text-zinc-600 hover:bg-zinc-100 rounded-lg transition-colors">Hủy</button>
          <button id="returnEarlyConfirmBtn" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors">Xác nhận</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="fixed bottom-4 right-4 bg-zinc-800 text-white px-4 py-3 rounded-lg shadow-lg hidden z-50">
    <p id="toastMessage" class="text-sm"></p>
  </div>

  <script src="sidebar.js"></script>
<script>
    // Backend API URL - detect environment (chỉ để đọc data)
    const API_URL =
      window.location.protocol === "file:" ||
      window.location.hostname === "localhost" ||
      window.location.hostname === "127.0.0.1"
        ? "http://localhost:3001/api"
        : "/api";

    // N8N Webhook URLs (để gửi actions)
    const N8N_CANCEL_WEBHOOK =
      window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
        ? "http://localhost:5678/webhook/cancel-leave"
        : "https://n8n.internalautomation.io.vn/webhook/cancel-leave";

    const N8N_UPDATE_WEBHOOK =
      window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
        ? "http://localhost:5678/webhook/update-leave"
        : "https://n8n.internalautomation.io.vn/webhook/update-leave";

    const N8N_RETURN_EARLY_WEBHOOK =
      window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
        ? "http://localhost:5678/webhook/return-early"
        : "https://n8n.internalautomation.io.vn/webhook/return-early";

    const N8N_LEAVE_REMINDER_WEBHOOK =
      window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
        ? "http://localhost:5678/webhook/leave-reminder"
        : "https://n8n.internalautomation.io.vn/webhook/leave-reminder";

    const token = localStorage.getItem("token");

    const clearSession = () => {
      localStorage.removeItem("token");
      localStorage.removeItem("user");
      window.location.href = "login.html";
    };

    const showToast = (message, isError = false) => {
      const toast = document.getElementById("toast");
      const toastMessage = document.getElementById("toastMessage");
      toastMessage.textContent = message;
      toast.className = `fixed bottom-4 right-4 px-4 py-3 rounded-lg shadow-lg z-50 ${isError ? "bg-red-600" : "bg-green-600"} text-white`;
      toast.classList.remove("hidden");
      setTimeout(() => toast.classList.add("hidden"), 4000);
    };

    let currentUser = null;
    let allLeaves = [];
    let currentTab = "all";
    let currentLeaveIdForReturn = null;

    const statusBadge = (status) => {
      const map = {
        pending:   { bg: "bg-yellow-100", text: "text-yellow-700", label: "Chờ duyệt",   icon: "fa-clock" },
        approved:  { bg: "bg-green-100",  text: "text-green-700",  label: "Đã duyệt",  icon: "fa-check" },
        rejected:  { bg: "bg-red-100",    text: "text-red-700",    label: "Từ chối",    icon: "fa-xmark" },
        cancelled: { bg: "bg-zinc-100",   text: "text-zinc-500",   label: "Đã hủy", icon: "fa-ban" },
      };
      const s = map[status] || map.pending;
      return `<span class="px-2.5 py-1 text-xs font-semibold rounded-full ${s.bg} ${s.text} flex items-center gap-1 w-fit">
        <i class="fa-solid ${s.icon} text-xs"></i>${s.label}</span>`;
    };

    const managerStatusBadge = (status) => {
      if (!status) return "";
      const map = {
        pending: { bg: "bg-yellow-100", text: "text-yellow-700", label: "Manager: Chờ" },
        approved: { bg: "bg-green-100", text: "text-green-700", label: "Manager: ✓" },
        rejected: { bg: "bg-red-100", text: "text-red-700", label: "Manager: ✗" },
      };
      const s = map[status] || { bg: "bg-zinc-100", text: "text-zinc-500", label: status };
      return `<span class="px-2 py-0.5 text-xs font-medium rounded-full ${s.bg} ${s.text}">${s.label}</span>`;
    };

    const hrStatusBadge = (status) => {
      if (!status || status === "skipped") return "";
      const map = {
        pending: { bg: "bg-yellow-100", text: "text-yellow-700", label: "HR: Chờ" },
        approved: { bg: "bg-green-100", text: "text-green-700", label: "HR: ✓" },
        rejected: { bg: "bg-red-100", text: "text-red-700", label: "HR: ✗" },
      };
      const s = map[status] || { bg: "bg-zinc-100", text: "text-zinc-500", label: status };
      return `<span class="px-2 py-0.5 text-xs font-medium rounded-full ${s.bg} ${s.text}">${s.label}</span>`;
    };

    // Hiển thị thông tin AI auto-approve
    const aiBadge = (r) => {
      if (!r.autoApproved) return "";
      const isApproved = r.aiDecision === "approve";
      const icon = isApproved ? "fa-robot" : "fa-robot";
      const bg = isApproved ? "bg-purple-100" : "bg-orange-100";
      const text = isApproved ? "text-purple-700" : "text-orange-700";
      const label = isApproved ? "🤖 AI duyệt" : "🤖 AI từ chối";
      const reason = r.aiReason || r.rejectionReason || "";
      return `
        <div class="mt-2 px-3 py-2 rounded-lg ${bg} text-xs">
          <p class="font-medium ${text} flex items-center gap-1">
            <i class="fa-solid ${icon}"></i>${label}
          </p>
          ${reason ? `<p class="text-zinc-600 mt-1">Lý do: ${reason}</p>` : ""}
        </div>
      `;
    };

    const showModal = (title, message, onConfirm, confirmText = "Xác nhận", isDanger = true) => {
      document.getElementById("modalTitle").textContent = title;
      document.getElementById("modalMessage").textContent = message;
      document.getElementById("confirmModal").classList.remove("hidden");
      const confirmBtn = document.getElementById("modalConfirmBtn");
      confirmBtn.textContent = confirmText;
      confirmBtn.className = `px-4 py-2 text-sm font-medium text-white rounded-lg transition-colors ${isDanger ? "bg-red-600 hover:bg-red-700" : "bg-blue-600 hover:bg-blue-700"}`;
      document.getElementById("modalCancelBtn").onclick = () => {
        document.getElementById("confirmModal").classList.add("hidden");
      };
      confirmBtn.onclick = () => {
        document.getElementById("confirmModal").classList.add("hidden");
        onConfirm();
      };
    };

    const updateStats = () => {
      document.getElementById("statTotal").textContent = allLeaves.length;
      document.getElementById("statPending").textContent = allLeaves.filter(l => l.status === "pending").length;
      document.getElementById("statApproved").textContent = allLeaves.filter(l => l.status === "approved").length;
      document.getElementById("statRejected").textContent = allLeaves.filter(l => l.status === "rejected").length;
    };

    const loadLeaves = async () => {
      try {
        const res = await fetch(`${API_URL}/leave`, {
          headers: { Authorization: `Bearer ${token}` },
        });
        if (!res.ok) throw new Error("Failed to load");
        allLeaves = await res.json();
        updateStats();
        renderLeaves();

        // Hide skeleton, show real list
        document.getElementById("loadingState").classList.add("hidden");
        document.getElementById("requestsList").classList.remove("hidden");
      } catch (err) {
        console.error("Error:", err);
        document.getElementById("loadingState").innerHTML = `
          <div class="text-center py-16 text-red-500">
            <i class="fa-solid fa-triangle-exclamation text-2xl mb-2"></i>
            <p>Không thể tải đơn nghỉ phép</p>
          </div>
        `;
      }
    };

    const formatDate = (dateStr) => {
      if (!dateStr) return "-";
      const d = new Date(dateStr);
      return d.toLocaleDateString("vi-VN", { day: "2-digit", month: "2-digit", year: "numeric" });
    };

    const renderLeaves = () => {
      const filtered = allLeaves.filter(r => {
        if (currentTab === "all") return true;
        return r.status === currentTab;
      });

      const container = document.getElementById("requestsList");
      const empty = document.getElementById("emptyState");

      if (filtered.length === 0) {
        container.classList.add("hidden");
        empty.classList.remove("hidden");
        return;
      }
      empty.classList.add("hidden");
      container.classList.remove("hidden");

      container.innerHTML = filtered.map(r => {
        const leaveId = r._id || r.id;
        const canCancel = r.status === "pending" && r.manager_status === "pending";
        const canUpdate = r.status === "pending" && r.manager_status === "pending";
        const canReturnEarly = r.status === "approved";
        const canSendReminder = r.status === "pending" && r.manager_status === "pending";
        const requiresHr = r.leave_days > 3;

        return `
        <div class="bg-white rounded-xl border border-zinc-200 shadow-sm p-6">
          <div class="flex items-start justify-between gap-4">
            <div class="flex-1">
              <div class="flex items-center gap-3 mb-2">
                <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold text-sm">
                  ${r.employee_name ? r.employee_name.slice(0,2).toUpperCase() : "??"}
                </div>
                <div>
                  <p class="font-semibold text-zinc-800">${r.employee_name || "Nhân viên"}</p>
                  <p class="text-xs text-zinc-400">${r.department || ""} • Mã: ${leaveId.slice(-8).toUpperCase()}</p>
                </div>
              </div>

              <div class="flex flex-wrap gap-2 mb-3">
                ${statusBadge(r.status)}
                ${managerStatusBadge(r.manager_status)}
                ${requiresHr ? hrStatusBadge(r.hr_status) : ""}
                ${r.refundDays ? `<span class="px-2 py-0.5 text-xs font-medium rounded-full bg-blue-100 text-blue-700">Hoàn: ${r.refundDays} ngày</span>` : ""}
              </div>

              ${r.autoApproved ? aiBadge(r) : ""}

              <div class="space-y-1 text-sm text-zinc-600">
                <p><i class="fa-solid fa-calendar mr-2 text-zinc-400 w-5"></i><strong>Ngày nghỉ:</strong> ${formatDate(r.leave_date)}</p>
                <p><i class="fa-solid fa-clock mr-2 text-zinc-400 w-5"></i><strong>Số ngày:</strong> ${r.leave_days} ngày</p>
                <p><i class="fa-solid fa-pen mr-2 text-zinc-400 w-5"></i><strong>Lý do:</strong> ${r.reason || "-"}</p>
                ${r.actualReturnDate ? `<p><i class="fa-solid fa-calendar-check mr-2 text-green-400 w-5"></i><strong>Ngày về thực tế:</strong> ${formatDate(r.actualReturnDate)}</p>` : ""}
              </div>

              ${r.manager_email ? `<p class="text-xs text-zinc-400 mt-2"><i class="fa-solid fa-envelope mr-1"></i>Gửi Manager: ${r.manager_email}</p>` : ""}
            </div>

            <div class="flex flex-col items-end gap-2">
              <div class="flex gap-2 flex-wrap justify-end">
                ${canCancel ? `
                  <button onclick="handleCancel('${leaveId}')"
                    class="px-3 py-1.5 text-xs font-semibold text-white bg-red-600 hover:bg-red-700 rounded-lg transition-colors flex items-center gap-1">
                    <i class="fa-solid fa-ban"></i> Hủy
                  </button>` : ""}
                ${canUpdate ? `
                  <button onclick="handleUpdate('${leaveId}')"
                    class="px-3 py-1.5 text-xs font-semibold text-white bg-yellow-600 hover:bg-yellow-700 rounded-lg transition-colors flex items-center gap-1">
                    <i class="fa-solid fa-pen"></i> Sửa
                  </button>` : ""}
                ${canReturnEarly ? `
                  <button onclick="openReturnEarlyModal('${leaveId}')"
                    class="px-3 py-1.5 text-xs font-semibold text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors flex items-center gap-1">
                    <i class="fa-solid fa-calendar-check"></i> Về sớm
                  </button>` : ""}
                ${canSendReminder ? `
                  <button onclick="handleSendReminder('${leaveId}')"
                    class="px-3 py-1.5 text-xs font-semibold text-white bg-zinc-600 hover:bg-zinc-700 rounded-lg transition-colors flex items-center gap-1">
                    <i class="fa-solid fa-bell"></i> Nhắc nhở
                  </button>` : ""}
              </div>
            </div>
          </div>
        </div>`;
      }).join("");
    };

    const handleCancel = (leaveId) => {
      showModal(
        "Hủy đơn nghỉ phép",
        "Bạn có chắc chắn muốn hủy đơn nghỉ phép này? Hành động này không thể hoàn tác.",
        async () => {
          try {
            // Call N8N webhook to handle cancellation
            const res = await fetch(N8N_CANCEL_WEBHOOK, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                leaveId: leaveId,
                token: token,
                action: "cancel",
                // Backend URL + endpoint for N8N to call
                backendUrl:
                  window.location.hostname === "localhost" ||
                  window.location.hostname === "127.0.0.1"
                    ? "http://localhost:3001/api/leave"
                    : "/api/leave",
                // Backend cancel endpoint (N8N will call POST .../cancel)
                cancelEndpoint:
                  window.location.hostname === "localhost" ||
                  window.location.hostname === "127.0.0.1"
                    ? "http://localhost:3001/api/leave/cancel"
                    : "/api/leave/cancel",
              }),
            });
            const data = await res.json();
            if (res.ok) {
              showToast("Đơn nghỉ phép đã được hủy thành công!");
              loadLeaves();
            } else {
              showToast(data.message || "Lỗi khi hủy đơn", true);
            }
          } catch (err) {
            showToast("Lỗi kết nối", true);
          }
        }
      );
    };

    const handleUpdate = (leaveId) => {
      const leave = allLeaves.find(l => (l._id || l.id) === leaveId);
      if (!leave) return;
      sessionStorage.setItem("editLeave", JSON.stringify(leave));
      window.location.href = `leave.html?edit=${leaveId}`;
    };

    const openReturnEarlyModal = (leaveId) => {
      currentLeaveIdForReturn = leaveId;
      const today = new Date().toISOString().split("T")[0];
      document.getElementById("returnDateInput").value = today;
      document.getElementById("returnEarlyModal").classList.remove("hidden");
    };

    document.getElementById("returnEarlyCancelBtn").addEventListener("click", () => {
      document.getElementById("returnEarlyModal").classList.add("hidden");
      currentLeaveIdForReturn = null;
    });

    document.getElementById("returnEarlyConfirmBtn").addEventListener("click", async () => {
      const returnDate = document.getElementById("returnDateInput").value;
      if (!returnDate) {
        showToast("Vui lòng chọn ngày về", true);
        return;
      }

      try {
        // Call N8N webhook for return-early
        const res = await fetch(N8N_RETURN_EARLY_WEBHOOK, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            leaveId: currentLeaveIdForReturn,
            actualReturnDate: returnDate,
            token: token,
            backendUrl:
              window.location.hostname === "localhost" ||
              window.location.hostname === "127.0.0.1"
                ? "http://localhost:3001/api/leave"
                : "/api/leave",
          }),
        });
        const data = await res.json();
        if (res.ok) {
          showToast(`Đã xử lý về sớm. Hoàn lại ${data.refundDays || 0} ngày phép!`);
          document.getElementById("returnEarlyModal").classList.add("hidden");
          currentLeaveIdForReturn = null;
          loadLeaves();
        } else {
          showToast(data.message || "Lỗi khi xử lý", true);
        }
      } catch (err) {
        showToast("Lỗi kết nối", true);
      }
    });

    const handleSendReminder = (leaveId) => {
      showModal(
        "Gửi nhắc nhở",
        "Gửi email nhắc nhở Manager về đơn nghỉ phép này?",
        async () => {
          try {
            // Call Backend directly (more reliable than N8N)
            const res = await fetch(`${API_URL}/leave/send-reminder`, {
              method: "POST",
              headers: { 
                "Content-Type": "application/json",
                "Authorization": `Bearer ${token}`
              },
              body: JSON.stringify({ leaveId }),
            });
            const data = await res.json();
            if (res.ok) {
              showToast("Đã gửi email nhắc nhở!");
            } else {
              showToast(data.message || "Lỗi khi gửi reminder", true);
            }
          } catch (err) {
            showToast("Lỗi kết nối", true);
          }
        },
        "Gửi nhắc nhở",
        false
      );
    };

    // Tabs
    ["All", "Pending", "Approved", "Rejected", "Cancelled"].forEach(tab => {
      document.getElementById(`tab${tab}`).addEventListener("click", () => {
        currentTab = tab.toLowerCase();
        document.querySelectorAll("[id^=tab]").forEach(b => {
          b.className = "px-4 py-2 text-sm font-medium rounded-lg bg-zinc-200 text-zinc-600 hover:bg-zinc-300";
        });
        document.getElementById(`tab${tab}`).className = "px-4 py-2 text-sm font-medium rounded-lg bg-blue-600 text-white";
        renderLeaves();
      });
    });

    // Init - Verify auth TRƯỚC khi hiển thị UI
    (async () => {
      if (!token) { clearSession(); return; }

      let me;
      try {
        const res = await fetch(`${API_URL}/auth/me`, {
          headers: { Authorization: `Bearer ${token}` },
        });
        if (!res.ok) { clearSession(); return; }
        me = await res.json();
      } catch { clearSession(); return; }

      currentUser = { id: me._id, name: me.name, email: me.email, department: me.department, role: me.role };
      localStorage.setItem("user", JSON.stringify(currentUser));

      document.getElementById("avatar").textContent = currentUser.name.slice(0,2).toUpperCase();
      document.getElementById("userName").textContent = currentUser.name;
      document.getElementById("userRole").textContent = currentUser.role === "hr" ? "HR" : currentUser.role === "manager" ? "Quản lý" : "Nhân viên";

      initSidebar();

      document.getElementById("logoutBtn")?.addEventListener("click", (e) => {
        e.preventDefault();
        clearSession();
      });

      // ✅ Verify OK - Hide loading
      document.getElementById("loadingOverlay").classList.add("hidden");

      await loadLeaves();
    })();
  </script>
</body>
</html>
