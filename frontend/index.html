<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - ApproveHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="layout.css" />
</head>
<body class="bg-zinc-100 font-sans">

  <div class="flex h-screen overflow-hidden">

    <!-- Sidebar (loaded via sidebar.js) -->
    <div id="appSidebar"></div>

    <!-- Main Column -->
    <div class="flex flex-col flex-1 overflow-hidden">

      <!-- Header -->
      <header class="h-16 bg-white border-b border-zinc-200 flex items-center px-6 gap-4 shrink-0 shadow-sm">
        <div class="flex-1 max-w-md flex items-center gap-2 bg-zinc-100 border border-zinc-200 rounded-lg px-3 py-2">
          <i class="fa-solid fa-magnifying-glass text-zinc-400 text-sm"></i>
          <input type="text" placeholder="Search..." class="flex-1 bg-transparent text-sm text-zinc-700 outline-none placeholder:text-zinc-400" />
        </div>
        <div class="flex-1"></div>
        <div id="userBadge" class="flex items-center gap-2">
          <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-xs font-bold" id="avatar"></div>
          <div class="text-left hidden sm:block">
            <p class="text-sm font-semibold text-zinc-800 leading-none" id="userName"></p>
            <p class="text-xs text-zinc-400 mt-0.5" id="userRole"></p>
          </div>
        </div>
      </header>

      <!-- Content -->
      <main class="flex-1 overflow-auto p-8">
        <div class="max-w-7xl mx-auto">

          <!-- ── Hero / Welcome ── -->
          <div class="mb-8">
            <h2 class="text-3xl font-bold text-zinc-900" id="welcomeTitle">Welcome back!</h2>
            <p class="text-zinc-500 mt-2 text-sm">Here's an overview of your leave requests and quick actions.</p>
          </div>

          <!-- ── Quick Actions ── -->
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10">
            <a href="leave.html" class="group bg-gradient-to-br from-blue-500 to-blue-600 rounded-2xl p-6 shadow-lg hover:shadow-xl hover:from-blue-600 hover:to-blue-700 transition-all duration-200">
              <div class="flex items-center gap-4">
                <div class="w-12 h-12 rounded-xl bg-white/20 flex items-center justify-center">
                  <i class="fa-solid fa-calendar-plus text-white text-xl"></i>
                </div>
                <div>
                  <h3 class="text-white font-semibold text-lg">Create New Request</h3>
                  <p class="text-blue-100 text-sm">Submit a leave application</p>
                </div>
              </div>
            </a>

            <a href="my-leaves.html" class="group bg-gradient-to-br from-zinc-600 to-zinc-700 rounded-2xl p-6 shadow-lg hover:shadow-xl hover:from-zinc-700 hover:to-zinc-800 transition-all duration-200">
              <div class="flex items-center gap-4">
                <div class="w-12 h-12 rounded-xl bg-white/20 flex items-center justify-center">
                  <i class="fa-solid fa-folder-open text-white text-xl"></i>
                </div>
                <div>
                  <h3 class="text-white font-semibold text-lg">My Leave Requests</h3>
                  <p class="text-zinc-200 text-sm">View and manage all requests</p>
                </div>
              </div>
            </a>

            <a href="settings.html" id="settingsLink" class="group bg-gradient-to-br from-purple-500 to-purple-600 rounded-2xl p-6 shadow-lg hover:shadow-xl hover:from-purple-600 hover:to-purple-700 transition-all duration-200 hidden">
              <div class="flex items-center gap-4">
                <div class="w-12 h-12 rounded-xl bg-white/20 flex items-center justify-center">
                  <i class="fa-solid fa-gears text-white text-xl"></i>
                </div>
                <div>
                  <h3 class="text-white font-semibold text-lg">System Settings</h3>
                  <p class="text-purple-100 text-sm">Manage users & email config</p>
                </div>
              </div>
            </a>
          </div>

          <!-- ── Stats Overview ── -->
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-10" id="statsContainer">
            <!-- Skeleton loading -->
            <div class="bg-white rounded-2xl border border-zinc-200 p-6 shadow-sm">
              <div class="flex items-center justify-between">
                <div class="space-y-2">
                  <div class="h-3 w-24 bg-zinc-200 rounded animate-pulse"></div>
                  <div class="h-10 w-16 bg-zinc-200 rounded animate-pulse"></div>
                </div>
                <div class="w-12 h-12 rounded-xl bg-zinc-100"></div>
              </div>
              <div class="h-3 w-32 bg-zinc-100 rounded mt-3"></div>
            </div>
            <div class="bg-white rounded-2xl border border-zinc-200 p-6 shadow-sm">
              <div class="flex items-center justify-between">
                <div class="space-y-2">
                  <div class="h-3 w-28 bg-zinc-200 rounded animate-pulse"></div>
                  <div class="h-10 w-12 bg-zinc-200 rounded animate-pulse"></div>
                </div>
                <div class="w-12 h-12 rounded-xl bg-zinc-100"></div>
              </div>
              <div class="h-3 w-40 bg-zinc-100 rounded mt-3"></div>
            </div>
            <div class="bg-white rounded-2xl border border-zinc-200 p-6 shadow-sm">
              <div class="flex items-center justify-between">
                <div class="space-y-2">
                  <div class="h-3 w-20 bg-zinc-200 rounded animate-pulse"></div>
                  <div class="h-10 w-12 bg-zinc-200 rounded animate-pulse"></div>
                </div>
                <div class="w-12 h-12 rounded-xl bg-zinc-100"></div>
              </div>
              <div class="h-3 w-36 bg-zinc-100 rounded mt-3"></div>
            </div>
            <div class="bg-white rounded-2xl border border-zinc-200 p-6 shadow-sm">
              <div class="flex items-center justify-between">
                <div class="space-y-2">
                  <div class="h-3 w-24 bg-zinc-200 rounded animate-pulse"></div>
                  <div class="h-10 w-12 bg-zinc-200 rounded animate-pulse"></div>
                </div>
                <div class="w-12 h-12 rounded-xl bg-zinc-100"></div>
              </div>
              <div class="h-3 w-32 bg-zinc-100 rounded mt-3"></div>
            </div>
          </div>

          <!-- ── Recent Activity ── -->
          <div class="bg-white rounded-2xl border border-zinc-200 shadow-sm overflow-hidden">
            <div class="px-6 py-5 border-b border-zinc-100 flex items-center justify-between">
              <div class="space-y-2">
                <div class="h-5 w-40 bg-zinc-200 rounded animate-pulse"></div>
                <div class="h-3 w-56 bg-zinc-100 rounded"></div>
              </div>
              <div class="h-8 w-24 bg-zinc-100 rounded animate-pulse"></div>
            </div>

            <!-- Activity List (Skeleton) -->
            <div id="recentActivitySkeleton" class="p-6 space-y-3">
              <div class="bg-zinc-50 rounded-xl p-4 border border-zinc-100">
                <div class="flex items-start justify-between gap-4">
                  <div class="flex-1 space-y-3">
                    <div class="flex items-center gap-3">
                      <div class="w-10 h-10 rounded-full bg-zinc-200 animate-pulse"></div>
                      <div class="space-y-2">
                        <div class="h-4 w-32 bg-zinc-200 rounded animate-pulse"></div>
                        <div class="h-3 w-48 bg-zinc-100 rounded"></div>
                      </div>
                    </div>
                    <div class="flex gap-2">
                      <div class="h-6 w-20 bg-zinc-200 rounded-full animate-pulse"></div>
                      <div class="h-6 w-24 bg-zinc-200 rounded-full animate-pulse"></div>
                    </div>
                    <div class="space-y-2">
                      <div class="h-4 w-64 bg-zinc-100 rounded"></div>
                      <div class="h-4 w-48 bg-zinc-100 rounded"></div>
                    </div>
                  </div>
                </div>
              </div>
              <div class="bg-zinc-50 rounded-xl p-4 border border-zinc-100">
                <div class="flex items-start justify-between gap-4">
                  <div class="flex-1 space-y-3">
                    <div class="flex items-center gap-3">
                      <div class="w-10 h-10 rounded-full bg-zinc-200 animate-pulse"></div>
                      <div class="space-y-2">
                        <div class="h-4 w-36 bg-zinc-200 rounded animate-pulse"></div>
                        <div class="h-3 w-40 bg-zinc-100 rounded"></div>
                      </div>
                    </div>
                    <div class="flex gap-2">
                      <div class="h-6 w-20 bg-zinc-200 rounded-full animate-pulse"></div>
                    </div>
                    <div class="space-y-2">
                      <div class="h-4 w-56 bg-zinc-100 rounded"></div>
                      <div class="h-4 w-40 bg-zinc-100 rounded"></div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- Real Data (hidden initially) -->
            <div id="recentActivity" class="p-6 space-y-3 hidden"></div>
          </div>

        </div>
      </main>

    </div>
  </div>

  <script src="sidebar.js"></script>
  <script>
    const API_URL =
      window.location.protocol === "file:" ||
      window.location.hostname === "localhost" ||
      window.location.hostname === "127.0.0.1"
        ? "http://localhost:3001/api"
        : "/api";

    const token = localStorage.getItem("token");

    const clearSession = () => {
      localStorage.removeItem("token");
      localStorage.removeItem("user");
      window.location.href = "login.html";
    };

    const init = async () => {
      // 1. Read cached user immediately (sync, no blocking)
      let user = JSON.parse(localStorage.getItem("user") || "{}");
      const roleLabels = { employee: "Employee", manager: "Manager", hr: "HR" };

      // Show cached user info right away
      document.getElementById("avatar").textContent = (user.name || "?").slice(0, 2).toUpperCase();
      document.getElementById("userName").textContent = user.name || "";
      document.getElementById("userRole").textContent = roleLabels[user.role] || user.role || "";
      document.getElementById("welcomeTitle").textContent = `Welcome back, ${user.name || "User"}!`;

      // 2. Verify token
      if (!token) {
        clearSession();
        return;
      }

      // 3. Init sidebar with cached user immediately
      await initSidebar({ user });

      // 4. Refresh user from API in background (non-blocking)
      try {
        const res = await fetch(`${API_URL}/auth/me`, {
          headers: { Authorization: `Bearer ${token}` },
        });
        if (!res.ok) {
          clearSession();
          return;
        }
        const me = await res.json();
        user = {
          id: me._id,
          name: me.name,
          email: me.email,
          department: me.department,
          role: me.role,
        };
        localStorage.setItem("user", JSON.stringify(user));
        // Update header with fresh data
        document.getElementById("avatar").textContent = (user.name || "?").slice(0, 2).toUpperCase();
        document.getElementById("userName").textContent = user.name || "";
        document.getElementById("userRole").textContent = roleLabels[user.role] || user.role || "";
        document.getElementById("welcomeTitle").textContent = `Welcome back, ${user.name || "User"}!`;
      } catch {
        // Network error — stick with cached user
      }

      // ── Status badges ──
      const statusBadge = (status) => {
        const map = {
          pending:   { bg: "bg-yellow-100", text: "text-yellow-700", label: "Pending" },
          approved:  { bg: "bg-green-100",  text: "text-green-700",  label: "Approved" },
          rejected:  { bg: "bg-red-100",    text: "text-red-700",    label: "Rejected" },
          cancelled: { bg: "bg-zinc-100",  text: "text-zinc-500",   label: "Cancelled" },
        };
        const s = map[status] || { bg: "bg-zinc-100", text: "text-zinc-500", label: status || "Unknown" };
        return `<span class="px-2 py-1 text-xs font-medium rounded-full ${s.bg} ${s.text}">${s.label}</span>`;
      };

      // ── Load stats & recent activity ──
      try {
        const token = localStorage.getItem("token");
        const res = await fetch(`${API_URL}/leave`, {
          headers: { Authorization: `Bearer ${token}` },
        });
        const data = await res.json();

        // Stats
        const now = new Date();
        const thisMonth = now.getMonth();
        const thisYear = now.getFullYear();

        const statTotal = document.getElementById("statTotal");
        const statPending = document.getElementById("statPending");
        const statApproved = document.getElementById("statApproved");
        const statRejected = document.getElementById("statRejected");

        if (statTotal) statTotal.textContent = data.length;
        if (statPending) statPending.textContent = data.filter(r => r.status === "pending").length;
        if (statApproved) {
          statApproved.textContent = data.filter(r => {
            if (r.status !== "approved") return false;
            const approvedAt = new Date(r.updatedAt);
            return approvedAt.getMonth() === thisMonth && approvedAt.getFullYear() === thisYear;
          }).length;
        }
        if (statRejected) statRejected.textContent = data.filter(r => r.status === "rejected").length;

        // Recent Activity Cards (last 5)
        const recentContainer = document.getElementById("recentActivity");
        const recentLeaves = data
          .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt))
          .slice(0, 5);

        if (recentLeaves.length === 0) {
          recentContainer.innerHTML = `
            <div class="text-center py-12 bg-zinc-50 rounded-xl border-2 border-dashed border-zinc-200">
              <i class="fa-regular fa-calendar text-4xl text-zinc-300 mb-3"></i>
              <p class="text-zinc-500 font-medium">No leave requests yet</p>
              <a href="leave.html" class="text-blue-600 text-sm mt-2 inline-block hover:underline">Create your first request →</a>
            </div>
          `;
        } else {
          recentContainer.innerHTML = recentLeaves.map(r => {
            const dateStr = new Date(r.leave_date).toLocaleDateString("vi-VN");
            const statusColor = {
              pending:   "border-l-yellow-500 bg-yellow-50/50",
              approved:  "border-l-green-500 bg-green-50/50",
              rejected:  "border-l-red-500 bg-red-50/50",
              cancelled: "border-l-zinc-400 bg-zinc-50/50",
            }[r.status] || "border-l-zinc-300 bg-white";

            return `
              <div class="group flex items-center justify-between p-4 rounded-xl border border-zinc-200 ${statusColor} hover:shadow-md transition-all">
                <div class="flex items-center gap-4 flex-1 min-w-0">
                  <div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0
                    ${r.status === "pending" ? "bg-yellow-100 text-yellow-600" :
                      r.status === "approved" ? "bg-green-100 text-green-600" :
                      r.status === "rejected" ? "bg-red-100 text-red-600" :
                      "bg-zinc-100 text-zinc-500"}">
                    <i class="fa-solid ${r.status === "pending" ? "fa-clock" :
                                      r.status === "approved" ? "fa-check" :
                                      r.status === "rejected" ? "fa-xmark" : "fa-ban"}"></i>
                  </div>
                  <div class="min-w-0 flex-1">
                    <div class="flex items-center gap-2 flex-wrap">
                      <p class="font-medium text-zinc-800 truncate">${r.reason || "Leave request"}</p>
                      ${statusBadge(r.status)}
                    </div>
                    <p class="text-xs text-zinc-500 mt-0.5">
                      ${dateStr} · ${r.leave_days} day${r.leave_days > 1 ? "s" : ""}
                    </p>
                  </div>
                </div>
                <a href="my-leaves.html" class="ml-4 text-blue-600 hover:text-blue-700 text-sm font-medium shrink-0">
                  View Details <i class="fa-solid fa-arrow-right"></i>
                </a>
              </div>
            `;
          }).join("");
        }
      } catch (err) {
        console.error("Error loading dashboard:", err);
      }
    };

    init();
  </script>

</body>
</html>
