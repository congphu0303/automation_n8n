<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - ApproveHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body class="bg-zinc-100 font-sans">

  <div class="flex h-screen overflow-hidden">

    <!-- Sidebar (loaded via sidebar.js) -->
    <div id="appSidebar"></div>

    <!-- Main Column -->
    <div class="flex flex-col flex-1 overflow-hidden">

      <!-- Header -->
      <header class="h-16 bg-white border-b border-zinc-200 flex items-center px-6 gap-4 shrink-0 shadow-sm">
        <div class="flex-1 max-w-md flex items-center gap-2 bg-zinc-100 border border-zinc-200 rounded-lg px-3 py-2">
          <i class="fa-solid fa-magnifying-glass text-zinc-400 text-sm"></i>
          <input type="text" placeholder="Search..." class="flex-1 bg-transparent text-sm text-zinc-700 outline-none placeholder:text-zinc-400" />
        </div>
        <div class="flex-1"></div>
        <div id="userBadge" class="flex items-center gap-2">
          <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-xs font-bold" id="avatar"></div>
          <div class="text-left hidden sm:block">
            <p class="text-sm font-semibold text-zinc-800 leading-none" id="userName"></p>
            <p class="text-xs text-zinc-400 mt-0.5" id="userRole"></p>
          </div>
        </div>
      </header>

      <!-- Loading overlay -->
      <div id="loadingOverlay" class="fixed inset-0 bg-zinc-100 flex items-center justify-center z-50">
        <div class="text-center">
          <i class="fa-solid fa-spinner fa-spin text-3xl text-blue-500 mb-3"></i>
          <p class="text-sm text-zinc-400">Loading...</p>
        </div>
      </div>

      <!-- Content -->
      <main class="flex-1 overflow-auto p-8">
        <div class="max-w-6xl mx-auto">
          <h2 class="text-2xl font-bold text-zinc-900" id="welcomeTitle">Welcome back!</h2>
          <p class="text-zinc-500 mt-1 text-sm">Here is an overview of your requests.</p>

          <!-- Stat Cards -->
          <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mt-8">
            <div class="bg-white rounded-xl border border-zinc-200 p-5 shadow-sm">
              <p class="text-xs font-medium text-zinc-400 uppercase tracking-wide">Total Requests</p>
              <p class="text-3xl font-bold text-zinc-900 mt-2" id="statTotal">0</p>
              <p class="text-xs text-zinc-500 mt-1">All time</p>
            </div>
            <div class="bg-white rounded-xl border border-zinc-200 p-5 shadow-sm">
              <p class="text-xs font-medium text-zinc-400 uppercase tracking-wide">Pending</p>
              <p class="text-3xl font-bold text-yellow-500 mt-2" id="statPending">0</p>
              <p class="text-xs text-zinc-500 mt-1">Waiting approval</p>
            </div>
            <div class="bg-white rounded-xl border border-zinc-200 p-5 shadow-sm">
              <p class="text-xs font-medium text-zinc-400 uppercase tracking-wide">Approved</p>
              <p class="text-3xl font-bold text-green-500 mt-2" id="statApproved">0</p>
              <p class="text-xs text-zinc-500 mt-1">This month</p>
            </div>
          </div>

          <!-- Recent Requests Table -->
          <div class="mt-8 bg-white rounded-xl border border-zinc-200 shadow-sm overflow-hidden">
            <div class="px-6 py-4 border-b border-zinc-100 flex items-center justify-between">
              <h3 class="font-semibold text-zinc-800">Recent Requests</h3>
              <a href="leave.html" class="text-sm text-blue-600 hover:text-blue-700 font-medium">
                <i class="fa-solid fa-plus mr-1"></i> New Request
              </a>
            </div>
            <div class="overflow-x-auto">
              <table class="w-full">
                <thead class="bg-zinc-50 border-b border-zinc-100">
                  <tr id="tableHeaders">
                  </tr>
                </thead>
                <tbody id="requestsTable" class="divide-y divide-zinc-100">
                  <tr>
                    <td colspan="6" class="px-6 py-8 text-center text-zinc-400 text-sm">Loading...</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </main>

    </div>
  </div>

  <script src="sidebar.js"></script>
  <script>
    // ─── PRODUCTION: Sửa domain này thành domain thật của bạn ───
    const API_URL = "https://approvehub.internalautomation.io.vn/api";

    const clearSession = () => {
      localStorage.removeItem("token");
      localStorage.removeItem("user");
      window.location.href = "login.html";
    };

    // ── Auth: validate token via /auth/me ──
    const token = localStorage.getItem("token");

    const init = async () => {
      document.getElementById("loadingOverlay").classList.add("hidden");

      if (!token) { clearSession(); return; }

      let me;
      try {
        const res = await fetch(`${API_URL}/auth/me`, {
          headers: { Authorization: `Bearer ${token}` },
        });
        if (!res.ok) { clearSession(); return; }
        me = await res.json();
      } catch { clearSession(); return; }

      // Store fresh user data
      const user = {
        id: me._id,
        name: me.name,
        email: me.email,
        department: me.department,
        role: me.role,
      };
      localStorage.setItem("user", JSON.stringify(user));

      const roleLabels = { employee: "Employee", manager: "Manager", hr: "HR" };

      // Header user badge
      document.getElementById("avatar").textContent = user.name ? user.name.slice(0,2).toUpperCase() : "??";
      document.getElementById("userName").textContent = user.name || "Guest";
      document.getElementById("userRole").textContent = roleLabels[user.role] || user.role || "";
      document.getElementById("welcomeTitle").textContent = `Welcome back, ${user.name || "User"}!`;

      // Init shared sidebar — handles role-based nav visibility
      initSidebar({ activePage: "index", user });

      // ── Status badges ──
      const statusBadge = (status) => {
        const map = {
          pending:   { bg: "bg-yellow-100", text: "text-yellow-700", label: "Pending" },
          approved:  { bg: "bg-green-100",  text: "text-green-700",  label: "Approved" },
          rejected:  { bg: "bg-red-100",    text: "text-red-700",    label: "Rejected" },
          skipped:   { bg: "bg-zinc-100",   text: "text-zinc-500",   label: "Skipped" },
        };
        const s = map[status] || map.pending;
        return `<span class="px-2 py-1 text-xs font-medium rounded-full ${s.bg} ${s.text}">${s.label}</span>`;
      };

      const approvalBadge = (status) => {
        if (!status || status === "skipped") return '<span class="text-zinc-300 text-xs">—</span>';
        return statusBadge(status);
      };

      // ── Load requests ──
      try {
        const res = await fetch(`${API_URL}/leave`, {
          headers: { Authorization: `Bearer ${token}` },
        });
        const data = await res.json();

        const now = new Date();
        const thisMonth = now.getMonth();
        const thisYear = now.getFullYear();

        document.getElementById("statTotal").textContent = data.length;
        document.getElementById("statPending").textContent = data.filter(r => r.status === "pending").length;
        document.getElementById("statApproved").textContent = data.filter(r => {
          if (r.status !== "approved") return false;
          const approvedAt = new Date(r.updatedAt);
          return approvedAt.getMonth() === thisMonth && approvedAt.getFullYear() === thisYear;
        }).length;

        const tbody = document.getElementById("requestsTable");
        const theadRow = document.getElementById("tableHeaders");
        const isManagerOrHR = user.role === "manager" || user.role === "hr";

        // ── Build headers based on role ──
        if (isManagerOrHR) {
          theadRow.innerHTML = `
            <th class="px-6 py-3 text-left text-xs font-medium text-zinc-500 uppercase">Employee</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-zinc-500 uppercase">Date</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-zinc-500 uppercase">Days</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-zinc-500 uppercase">Reason</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-zinc-500 uppercase">Manager</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-zinc-500 uppercase">HR</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-zinc-500 uppercase">Status</th>
          `;
        } else {
          theadRow.innerHTML = `
            <th class="px-6 py-3 text-left text-xs font-medium text-zinc-500 uppercase">Date</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-zinc-500 uppercase">Days</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-zinc-500 uppercase">Reason</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-zinc-500 uppercase">Manager</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-zinc-500 uppercase">HR</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-zinc-500 uppercase">Status</th>
          `;
        }

        if (data.length === 0) {
          const colCount = isManagerOrHR ? 7 : 6;
          tbody.innerHTML = `<tr><td colspan="${colCount}" class="px-6 py-8 text-center text-zinc-400 text-sm">No requests yet. <a href="leave.html" class="text-blue-600 hover:underline">Create one</a></td></tr>`;
          return;
        }
        tbody.innerHTML = data.map(r => `
          <tr class="hover:bg-zinc-50">
            ${isManagerOrHR ? `<td class="px-6 py-4 text-sm font-medium text-zinc-800">${r.employee_name || "—"}</td>` : ""}
            <td class="px-6 py-4 text-sm text-zinc-700">${new Date(r.leave_date).toLocaleDateString()}</td>
            <td class="px-6 py-4 text-sm text-zinc-700">${r.leave_days} day${r.leave_days > 1 ? "s" : ""}</td>
            <td class="px-6 py-4 text-sm text-zinc-500 max-w-xs truncate">${r.reason}</td>
            <td class="px-6 py-4">${approvalBadge(r.manager_status)}</td>
            <td class="px-6 py-4">${approvalBadge(r.hr_status)}</td>
            <td class="px-6 py-4">${statusBadge(r.status)}</td>
          </tr>
        `).join("");
      } catch (err) {
        console.error("Error loading requests:", err);
      }
    };

    init();
  </script>

</body>
</html>
