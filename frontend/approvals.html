<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Approvals - ApproveHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="layout.css" />
</head>
<body class="bg-zinc-100 font-sans">

  <div class="flex h-screen overflow-hidden">

    <!-- Sidebar (loaded via sidebar.js) -->
    <div id="appSidebar"></div>

    <!-- Main Column -->
    <div class="flex flex-col flex-1 overflow-hidden">

      <!-- Header -->
      <header class="h-16 bg-white border-b border-zinc-200 flex items-center px-6 gap-4 shrink-0 shadow-sm">
        <h2 class="text-lg font-semibold text-zinc-800" id="pageTitle">Pending Approvals</h2>
        <div class="flex-1"></div>
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-xs font-bold" id="avatar"></div>
          <div class="text-left hidden sm:block">
            <p class="text-sm font-semibold text-zinc-800 leading-none" id="userName"></p>
            <p class="text-xs text-zinc-400 mt-0.5" id="userRole"></p>
          </div>
        </div>
      </header>

      <!-- Content -->
      <main class="flex-1 overflow-auto p-8">
        <div class="max-w-5xl mx-auto">

          <!-- Token-based view (from email link) -->
          <div id="tokenView" class="hidden">
            <div id="tokenCard" class="bg-white rounded-xl border border-zinc-200 shadow-sm p-6">
              <h3 class="text-lg font-semibold text-zinc-800 mb-4">Leave Request Details</h3>
              <div id="tokenDetails" class="space-y-3 text-sm text-zinc-600"></div>
              <div id="tokenActions" class="mt-6 flex gap-3"></div>
              <div id="tokenResult" class="mt-4 hidden"></div>
            </div>
          </div>

          <!-- Normal list view -->
          <div id="listView">
            <!-- Tabs -->
            <div class="flex gap-2 mb-6">
              <button id="tabPending" class="px-4 py-2 text-sm font-medium rounded-lg bg-blue-600 text-white">Pending</button>
              <button id="tabApproved" class="px-4 py-2 text-sm font-medium rounded-lg bg-zinc-200 text-zinc-600 hover:bg-zinc-300">Approved</button>
              <button id="tabRejected" class="px-4 py-2 text-sm font-medium rounded-lg bg-zinc-200 text-zinc-600 hover:bg-zinc-300">Rejected</button>
            </div>

            <!-- Pending List (with Skeleton) -->
            <div id="loadingState" class="space-y-4">
              <!-- Skeleton cards (3 items) -->
              <div class="bg-white rounded-xl border border-zinc-200 p-6">
                <div class="flex items-start justify-between gap-4">
                  <div class="flex-1 space-y-3">
                    <div class="flex items-center gap-3">
                      <div class="w-10 h-10 rounded-full bg-zinc-200 animate-pulse"></div>
                      <div class="space-y-2">
                        <div class="h-4 w-32 bg-zinc-200 rounded animate-pulse"></div>
                        <div class="h-3 w-48 bg-zinc-100 rounded"></div>
                      </div>
                    </div>
                    <div class="flex gap-2">
                      <div class="h-6 w-20 bg-zinc-200 rounded-full animate-pulse"></div>
                      <div class="h-6 w-24 bg-zinc-200 rounded-full animate-pulse"></div>
                    </div>
                    <div class="space-y-2">
                      <div class="h-4 w-64 bg-zinc-100 rounded"></div>
                      <div class="h-4 w-48 bg-zinc-100 rounded"></div>
                    </div>
                  </div>
                </div>
              </div>
              <div class="bg-white rounded-xl border border-zinc-200 p-6">
                <div class="flex items-start justify-between gap-4">
                  <div class="flex-1 space-y-3">
                    <div class="flex items-center gap-3">
                      <div class="w-10 h-10 rounded-full bg-zinc-200 animate-pulse"></div>
                      <div class="space-y-2">
                        <div class="h-4 w-36 bg-zinc-200 rounded animate-pulse"></div>
                        <div class="h-3 w-40 bg-zinc-100 rounded"></div>
                      </div>
                    </div>
                    <div class="flex gap-2">
                      <div class="h-6 w-20 bg-zinc-200 rounded-full animate-pulse"></div>
                    </div>
                    <div class="space-y-2">
                      <div class="h-4 w-56 bg-zinc-100 rounded"></div>
                      <div class="h-4 w-40 bg-zinc-100 rounded"></div>
                    </div>
                  </div>
                </div>
              </div>
              <div class="bg-white rounded-xl border border-zinc-200 p-6">
                <div class="flex items-start justify-between gap-4">
                  <div class="flex-1 space-y-3">
                    <div class="flex items-center gap-3">
                      <div class="w-10 h-10 rounded-full bg-zinc-200 animate-pulse"></div>
                      <div class="space-y-2">
                        <div class="h-4 w-28 bg-zinc-200 rounded animate-pulse"></div>
                        <div class="h-3 w-52 bg-zinc-100 rounded"></div>
                      </div>
                    </div>
                    <div class="flex gap-2">
                      <div class="h-6 w-20 bg-zinc-200 rounded-full animate-pulse"></div>
                      <div class="h-6 w-24 bg-zinc-200 rounded-full animate-pulse"></div>
                    </div>
                    <div class="space-y-2">
                      <div class="h-4 w-48 bg-zinc-100 rounded"></div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- Real List (hidden initially) -->
            <div id="pendingList" class="space-y-4 hidden"></div>

            <!-- Empty State -->
            <div id="emptyState" class="hidden bg-white rounded-xl border border-zinc-200 p-12 text-center">
              <i class="fa-solid fa-inbox text-4xl text-zinc-300 mb-3"></i>
              <p class="text-zinc-500 font-medium">No requests</p>
              <p class="text-zinc-400 text-sm mt-1">All caught up!</p>
            </div>
          </div>

        </div>
      </main>

    </div>
  </div>

  <script src="sidebar.js"></script>
  <script>
    // ─── CONFIG ───
    // Backend URL (chỉ để đọc data)
    const API_URL =
      window.location.protocol === "file:" ||
      window.location.hostname === "localhost" ||
      window.location.hostname === "127.0.0.1"
        ? "http://localhost:3001/api"
        : "/api";

    // N8N URLs (để gửi action)
    const N8N_MANAGER_WEBHOOK =
      window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
        ? "http://localhost:5678/webhook/manager-decision"
        : "https://n8n.internalautomation.io.vn/webhook/manager-decision";

    const N8N_HR_WEBHOOK =
      window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
        ? "http://localhost:5678/webhook/hr-decision"
        : "https://n8n.internalautomation.io.vn/webhook/hr-decision";

    const urlParams = new URLSearchParams(window.location.search);
    const approvalToken = urlParams.get("token");
    const token = localStorage.getItem("token");

    // ─── HELPERS ───

    // ─── GLOBAL STATE ───
    let userRole = "";

    // ─── DEFINE FUNCTIONS FIRST (before calling) ───
    const statusBadge = (status) => {
      const map = {
        pending: { bg: "bg-yellow-100", text: "text-yellow-700", label: "Pending" },
        approved: { bg: "bg-green-100", text: "text-green-700", label: "Approved" },
        rejected: { bg: "bg-red-100", text: "text-red-700", label: "Rejected" },
        skipped: { bg: "bg-zinc-100", text: "text-zinc-500", label: "Skipped" },
      };
      const s = map[status] || map.pending;
      return `<span class="px-2 py-1 text-xs font-medium rounded-full ${s.bg} ${s.text}">${s.label}</span>`;
    };

    let currentTab = "pending";

    // Lưu dữ liệu đơn khi load token (để dùng khi approve)
    let tokenRequestData = null;

    async function loadTokenRequest(tkn) {
      try {
        const res = await fetch(`${API_URL}/approval/token/${tkn}`);
        const data = await res.json();

        if (!res.ok) {
          document.getElementById("tokenDetails").innerHTML = `<p class="text-red-500">${data.message}</p>`;
          document.getElementById("loadingState").classList.add("hidden");
          document.getElementById("tokenView").classList.remove("hidden");
          return;
        }

        // Lưu dữ liệu để dùng khi approve
        tokenRequestData = data;

        // Kiểm tra token đã hết hạn chưa
        if (data.tokenExpired) {
          document.getElementById("tokenDetails").innerHTML = `
            <div class="bg-red-50 border border-red-200 rounded-lg p-4 mb-4">
              <p class="text-red-600 font-medium"><i class="fa-solid fa-clock mr-2"></i>Link đã hết hạn</p>
              <p class="text-red-500 text-sm mt-1">Hạn duyệt: ${data.tokenExpiresAt}</p>
              <p class="text-red-500 text-sm mt-2">Vui lòng liên hệ nhân viên để gửi lại đơn xin nghỉ phép.</p>
            </div>
          `;
          document.getElementById("tokenActions").innerHTML = "";
          // Hide skeleton, show token view
          document.getElementById("loadingState").classList.add("hidden");
          document.getElementById("tokenView").classList.remove("hidden");
          return;
        }

        const myStatus = data.approvalType === "manager" ? data.manager_status : data.hr_status;

        document.getElementById("tokenDetails").innerHTML = `
          <p><strong>Employee:</strong> ${data.employee_name}</p>
          <p><strong>Email:</strong> ${data.employee_email}</p>
          <p><strong>Department:</strong> ${data.department}</p>
          <p><strong>Leave Date:</strong> ${new Date(data.leave_date).toLocaleDateString()}</p>
          <p><strong>Number of Days:</strong> ${data.leave_days} day${data.leave_days > 1 ? "s" : ""}</p>
          <p><strong>Reason:</strong> ${data.reason}</p>
          <p><strong>Manager Decision:</strong> ${statusBadge(data.manager_status)}</p>
          <p><strong>HR Decision:</strong> ${statusBadge(data.hr_status)}</p>
          <p><strong>Final Status:</strong> ${statusBadge(data.finalStatus)}</p>
          ${data.tokenExpiresAt ? `<p class="text-xs text-zinc-400 mt-2"><i class="fa-solid fa-clock mr-1"></i>Link expires: ${data.tokenExpiresAt}</p>` : ""}
        `;

        const actionsDiv = document.getElementById("tokenActions");
        const resultDiv = document.getElementById("tokenResult");

        if (myStatus === "pending") {
          const approvalType = data.approvalType;
          actionsDiv.innerHTML = `
            <button onclick="handleApproval('${tkn}', 'approve', '${approvalType}')"
              class="px-6 py-2.5 text-sm font-semibold text-white bg-green-600 hover:bg-green-700 rounded-xl transition-colors flex items-center gap-2">
              <i class="fa-solid fa-check text-xs"></i> Approve
            </button>
            <button onclick="handleApproval('${tkn}', 'reject', '${approvalType}')"
              class="px-6 py-2.5 text-sm font-semibold text-white bg-red-600 hover:bg-red-700 rounded-xl transition-colors flex items-center gap-2">
              <i class="fa-solid fa-xmark text-xs"></i> Reject
            </button>
          `;
        } else {
          resultDiv.classList.remove("hidden");
          resultDiv.innerHTML = `<p class="text-sm text-zinc-500">You have already <strong>${myStatus}</strong> this request.</p>`;
        }
      } catch (err) {
        console.error("loadTokenRequest error:", err);
        document.getElementById("tokenDetails").innerHTML = `<p class="text-red-500">Error loading request</p>`;
      }
      // Hide skeleton, show token view
      document.getElementById("loadingState").classList.add("hidden");
      document.getElementById("tokenView").classList.remove("hidden");
    }

    async function handleApproval(tkn, action, type) {
      const resultDiv = document.getElementById("tokenResult");
      resultDiv.classList.remove("hidden");
      resultDiv.innerHTML = `<p class="text-sm text-blue-500"><i class="fa-solid fa-spinner fa-spin mr-1"></i> Processing...</p>`;

      // Lấy email người duyệt từ session đã đăng nhập
      const currentUser = JSON.parse(localStorage.getItem("user") || "{}");
      const approverEmail = currentUser.email || "";

      // Determine endpoint based on type
      const endpoint = type === "hr"
        ? `${API_URL}/approval/hr`
        : `${API_URL}/approval/manager`;

      try {
        // Try direct backend call first (more reliable)
        let res = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token: tkn, action: action, approverEmail }),
        });

        // If direct call fails, try N8N webhook
        if (!res.ok) {
          console.warn("Direct backend call failed, trying N8N...");
          const n8nWebhookUrl = type === "hr"
            ? (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
              ? "http://localhost:5678/webhook/hr-decision"
              : "https://n8n.internalautomation.io.vn/webhook/hr-decision")
            : (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
              ? "http://localhost:5678/webhook/manager-decision"
              : "https://n8n.internalautomation.io.vn/webhook/manager-decision");

          res = await fetch(n8nWebhookUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              token: tkn,
              action: action,
              approverEmail,
              employeeName: tokenRequestData?.employee_name || "",
              employeeEmail: tokenRequestData?.employee_email || "",
              department: tokenRequestData?.department || "",
              leaveDate: tokenRequestData?.leave_date || "",
              leaveDays: tokenRequestData?.leave_days || 0,
              reason: tokenRequestData?.reason || "",
              requiresHrApproval: tokenRequestData?.leave_days > 3 || false,
              hrApprovalLink: tokenRequestData?.hrApprovalLink || "",
              hrEmail: tokenRequestData?.hrEmail || tokenRequestData?.hr_email || ""
            }),
          });
        }

        // Get response data
        const data = await res.json().catch(() => ({}));

        if (res.ok) {
          resultDiv.innerHTML = `<p class="text-sm text-green-600 font-medium">${data.message || "Action completed. Email notification sent."}</p>`;
          setTimeout(() => {
            if (window.opener) {
              window.opener.location.reload();
              window.close();
            } else {
              window.location.href = "approvals.html";
            }
          }, 2000);
        } else {
          resultDiv.innerHTML = `<p class="text-sm text-red-500">${data.message || "Error"}</p>`;
        }
      } catch {
        resultDiv.innerHTML = `<p class="text-sm text-red-500">Connection error</p>`;
      }
    }

    async function loadRequests() {
      try {
        const res = await fetch(`${API_URL}/leave`, {
          headers: { Authorization: `Bearer ${token}` },
        });
        const data = await res.json();
        if (!res.ok) {
          console.error("loadRequests failed:", res.status);
          return;
        }
        renderList(data);

        // Hide skeleton, show real list
        document.getElementById("loadingState").classList.add("hidden");
        document.getElementById("pendingList").classList.remove("hidden");
      } catch (err) {
        console.error("loadRequests error:", err);
      }
    }

    function renderList(requests) {
      const filtered = requests.filter(r => {
        if (currentTab === "pending") {
          if (userRole === "manager") {
            // Manager thấy: đơ của phòng mình, đang chờ mình duyệt
            return r.manager_status === "pending";
          }
          if (userRole === "hr") {
            // HR chỉ thấy: đơ đã manager duyệt + > 3 ngày + chờ HR duyệt
            return r.manager_status === "approved" && r.hr_status === "pending" && r.leave_days > 3;
          }
        }
        if (currentTab === "approved") return r.status === "approved";
        if (currentTab === "rejected") return r.status === "rejected";
        return false;
      });

      const container = document.getElementById("pendingList");
      const empty = document.getElementById("emptyState");

      if (filtered.length === 0) {
        container.innerHTML = "";
        empty.classList.remove("hidden");
        return;
      }
      empty.classList.add("hidden");

      container.innerHTML = filtered.map(r => {
        let badgeHtml;
        if (currentTab === "pending") {
          if (userRole === "hr") {
            badgeHtml = statusBadge(r.hr_status);
          } else if (userRole === "manager" && r.manager_status === "approved" && r.status === "pending") {
            badgeHtml = `<span class="px-2 py-1 text-xs font-medium rounded-full bg-yellow-100 text-yellow-700">
              <i class="fa-solid fa-hourglass-half mr-1"></i>Chờ HR duyệt
            </span>`;
          } else {
            badgeHtml = statusBadge(r.manager_status);
          }
        } else {
          badgeHtml = statusBadge(r.status);
        }

        const canApproveAsManager = userRole === "manager" && r.manager_status === "pending";
        const canApproveAsHR = userRole === "hr" && r.manager_status === "approved" && r.hr_status === "pending" && !!r.hrApprovalToken;
        const activeToken = canApproveAsHR ? r.hrApprovalToken : r.managerApprovalToken;
        const activeEndpoint = canApproveAsHR
          ? `${API_URL}/approval/hr`
          : `${API_URL}/approval/manager`;

        return `
        <div class="bg-white rounded-xl border border-zinc-200 shadow-sm p-6">
          <div class="flex items-start justify-between">
            <div>
              <div class="flex items-center gap-3 mb-2">
                <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold text-sm">
                  ${r.employee_name ? r.employee_name.slice(0,2).toUpperCase() : "??"}
                </div>
                <div>
                  <p class="font-semibold text-zinc-800">${r.employee_name}</p>
                  <p class="text-xs text-zinc-400">${r.department}</p>
                </div>
              </div>
              <div class="space-y-1 text-sm text-zinc-600 mt-3">
                <p><i class="fa-solid fa-calendar mr-2 text-zinc-400"></i><strong>Date:</strong> ${new Date(r.leave_date).toLocaleDateString()}</p>
                <p><i class="fa-solid fa-clock mr-2 text-zinc-400"></i><strong>Days:</strong> ${r.leave_days} day${r.leave_days > 1 ? "s" : ""}</p>
                <p><i class="fa-solid fa-pen mr-2 text-zinc-400"></i><strong>Reason:</strong> ${r.reason}</p>
              </div>
            </div>
            <div class="text-right shrink-0 flex flex-col items-end gap-2">
              ${badgeHtml}
              ${r.leave_days > 3 ? `<p class="text-xs text-red-500 font-medium"><i class="fa-solid fa-info-circle mr-1"></i>Needs HR</p>` : ""}
              ${(canApproveAsManager || canApproveAsHR) ? `
                <div class="flex gap-2 mt-2">
                  <button onclick="quickApprove('${activeToken}', '${activeEndpoint}', this, ${JSON.stringify(r).replace(/'/g, "\\'")})"
                    class="px-4 py-1.5 text-xs font-semibold text-white bg-green-600 hover:bg-green-700 rounded-lg transition-colors flex items-center gap-1">
                    <i class="fa-solid fa-check"></i> Approve
                  </button>
                  <button onclick="quickReject('${activeToken}', '${activeEndpoint}', this, ${JSON.stringify(r).replace(/'/g, "\\'")})"
                    class="px-4 py-1.5 text-xs font-semibold text-white bg-red-600 hover:bg-red-700 rounded-lg transition-colors flex items-center gap-1">
                    <i class="fa-solid fa-xmark"></i> Reject
                  </button>
                </div>` : ""}
            </div>
          </div>
        </div>`;
      }).join("");
    }

    async function quickApprove(tkn, endpoint, btn, requestData) {
      const currentUser = JSON.parse(localStorage.getItem("user") || "{}");
      requestData.approverEmail = currentUser.email || "";
      await handleLeaveAction(tkn, endpoint, "approve", btn, requestData);
    }

    async function quickReject(tkn, endpoint, btn, requestData) {
      const currentUser = JSON.parse(localStorage.getItem("user") || "{}");
      requestData.approverEmail = currentUser.email || "";
      await handleLeaveAction(tkn, endpoint, "reject", btn, requestData);
    }

    async function handleLeaveAction(tkn, endpoint, action, btn, requestData) {
      const row = btn.closest(".bg-white");
      const buttons = row.querySelectorAll("button");
      buttons.forEach(b => { b.disabled = true; b.classList.add("opacity-50"); });

      const badgeArea = row.querySelector(".shrink-0");
      badgeArea.innerHTML = `<p class="text-xs text-blue-500 font-medium"><i class="fa-solid fa-spinner fa-spin mr-1"></i>Processing...</p>`;

      // Determine if this is HR approval
      const isHR = endpoint.includes("hr");
      const n8nWebhookUrl = isHR ? N8N_HR_WEBHOOK : N8N_MANAGER_WEBHOOK;

      try {
        // Call N8N webhook with full request data
        const res = await fetch(n8nWebhookUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            token: tkn,
            action: action,
            // Additional data from requestData for N8N to pass to backend
            employeeName: requestData.employee_name,
            employeeEmail: requestData.employee_email,
            leaveDate: requestData.leave_date,
            leaveDays: requestData.leave_days,
            reason: requestData.reason,
            department: requestData.department,
            // Include manager email if available (for email notifications)
            managerEmail: requestData.manager_email || "",
            // Backend URL for N8N to call
            backendUrl:
              window.location.hostname === "localhost" ||
              window.location.hostname === "127.0.0.1"
                ? "http://localhost:3001/api/approval/manager"
                : "/api/approval/manager",
          }),
        });
        
        // If N8N fails, fallback to direct backend call
        if (!res.ok) {
          console.warn("N8N webhook failed, trying direct backend call...");
          const directRes = await fetch(endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token: tkn, action: action }),
          });
          
          if (!directRes.ok) {
            const errorData = await directRes.json().catch(() => ({}));
            badgeArea.innerHTML = `<p class="text-xs text-red-500 font-medium"><i class="fa-solid fa-circle-exclamation mr-1"></i>${errorData.message || "Error"}</p>`;
            buttons.forEach(b => { b.disabled = false; b.classList.remove("opacity-50"); });
            return;
          }
        }
        
        const data = await res.json().catch(() => ({}));

        const color = action === "approve" ? "text-green-600" : "text-red-600";
        const icon = action === "approve" ? "fa-check-circle" : "fa-xmark-circle";
        badgeArea.innerHTML = `<p class="text-xs font-medium ${color}"><i class="fa-solid ${icon} mr-1"></i>${data.message || (action === "approve" ? "Approved" : "Rejected")}</p>`;
        setTimeout(loadRequests, 1500);
      } catch (error) {
        console.error("Approval error:", error);
        
        // Final fallback: direct backend call
        try {
          const fallbackRes = await fetch(endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token: tkn, action: action }),
          });
          
          if (fallbackRes.ok) {
            const color = action === "approve" ? "text-green-600" : "text-red-600";
            const icon = action === "approve" ? "fa-check-circle" : "fa-xmark-circle";
            badgeArea.innerHTML = `<p class="text-xs font-medium ${color}"><i class="fa-solid ${icon} mr-1"></i>${action === "approve" ? "Approved" : "Rejected"} (direct)</p>`;
            setTimeout(loadRequests, 1500);
            return;
          }
        } catch (fallbackError) {
          console.error("Fallback also failed:", fallbackError);
        }
        
        badgeArea.innerHTML = `<p class="text-xs text-red-500 font-medium"><i class="fa-solid fa-circle-exclamation mr-1"></i>Connection error</p>`;
        buttons.forEach(b => { b.disabled = false; b.classList.remove("opacity-50"); });
      }
    }

    // ─── TABS ───
    ["Pending", "Approved", "Rejected"].forEach(tab => {
      const btn = document.getElementById(`tab${tab}`);
      btn.addEventListener("click", () => {
        currentTab = tab.toLowerCase();
        document.querySelectorAll("[id^=tab]").forEach(b => {
          b.className = "px-4 py-2 text-sm font-medium rounded-lg bg-zinc-200 text-zinc-600 hover:bg-zinc-300";
        });
        btn.className = "px-4 py-2 text-sm font-medium rounded-lg bg-blue-600 text-white";
        loadRequests();
      });
    });

    // ─── INITIALIZATION (cache-first via sidebar.js) ───
    // Ensure userRole is set BEFORE any async operations
    const initPage = async () => {
      // 1. Get user first (cache-first via sidebar)
      const user = await getCachedUser();
      if (!user) return;

      // 2. Set userRole IMMEDIATELY before anything else
      userRole = user.role;

      // Check permission
      if (userRole !== "manager" && userRole !== "hr") {
        document.getElementById("listView").innerHTML = `
          <div class="bg-white rounded-xl border border-zinc-200 p-12 text-center">
            <i class="fa-solid fa-lock text-4xl text-zinc-300 mb-3"></i>
            <p class="text-zinc-500 font-medium">Bạn không có quyền truy cập trang này.</p>
            <a href="index.html" class="mt-4 inline-block text-blue-600 hover:underline">Quay về Dashboard</a>
          </div>`;
        document.getElementById("loadingState").classList.add("hidden");
        document.getElementById("listView").classList.remove("hidden");
        return;
      }

      // 3. Init sidebar UI with user object (avoids double auth call)
      await initSidebar({ user });

      document.getElementById("avatar").textContent = (user.name || "??").slice(0, 2).toUpperCase();
      document.getElementById("userName").textContent = user.name || "";
      document.getElementById("userRole").textContent = userRole === "hr" ? "HR" : "Manager";
      document.getElementById("pageTitle").textContent = userRole === "hr" ? "HR Approvals" : "Manager Approvals";

      // 4. Load data AFTER userRole is guaranteed to be set
      if (approvalToken) {
        document.getElementById("listView").classList.add("hidden");
        await loadTokenRequest(approvalToken);
      } else {
        document.getElementById("tokenView").classList.add("hidden");
        await loadRequests();
      }
    };

    // Nếu chưa đăng nhập và có approval token → lưu token rồi redirect login
    if (!token && approvalToken) {
      sessionStorage.setItem("pendingApprovalToken", approvalToken);
      window.location.href = "login.html?returnUrl=" + encodeURIComponent(window.location.href);
      return;
    }

    // Nếu chưa đăng nhập và không có token → redirect login
    if (!token) {
      window.location.href = "login.html";
      return;
    }

    // Start initialization
    initPage();
  </script>

</body>
</html>
