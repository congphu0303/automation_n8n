<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meeting Rooms - ApproveHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body class="bg-zinc-100 font-sans">

  <div class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-60 bg-zinc-900 flex flex-col shrink-0">
      <div class="px-6 py-5 border-b border-zinc-800">
        <h1 class="text-white text-lg font-bold tracking-tight">
          Approve<span class="text-blue-400">Hub</span>
        </h1>
        <p class="text-zinc-500 text-xs mt-0.5">Internal System</p>
      </div>

      <nav class="flex-1 px-3 py-4 space-y-1">
        <a href="index.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
          <i class="fa-solid fa-grip text-base w-5"></i> Dashboard
        </a>
        <a href="leave.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
          <i class="fa-solid fa-calendar-check text-base w-5"></i> Leave Request
        </a>
        <a href="approvals.html" id="navApprovals" class="hidden flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
          <i class="fa-solid fa-clipboard-check text-base w-5"></i> Approvals
        </a>
        <div class="my-2 border-t border-zinc-800"></div>
        <a href="rooms.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium bg-blue-600 text-white">
          <i class="fa-solid fa-door-open text-base w-5"></i> Meeting Rooms
        </a>
        <a href="book-room.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
          <i class="fa-solid fa-calendar-plus text-base w-5"></i> Book Room
        </a>
        <a href="booking-dashboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
          <i class="fa-solid fa-list text-base w-5"></i> My Bookings
        </a>
        <a href="meeting-approvals.html" id="navMeetingApprovals" class="hidden flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
          <i class="fa-solid fa-user-check text-base w-5"></i> Room Approvals
        </a>
      </nav>

      <div class="px-3 py-4 border-t border-zinc-800">
        <a href="#" id="logoutBtn" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
          <i class="fa-solid fa-right-from-bracket text-base w-5"></i> Sign Out
        </a>
      </div>
    </aside>

    <!-- Main Column -->
    <div class="flex flex-col flex-1 overflow-hidden">

      <!-- Header -->
      <header class="h-16 bg-white border-b border-zinc-200 flex items-center px-6 gap-4 shrink-0 shadow-sm">
        <div class="flex-1"></div>
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-xs font-bold" id="avatar"></div>
          <div class="text-left hidden sm:block">
            <p class="text-sm font-semibold text-zinc-800 leading-none" id="userName"></p>
            <p class="text-xs text-zinc-400 mt-0.5" id="userRole"></p>
          </div>
        </div>
      </header>

      <!-- Content -->
      <main class="flex-1 overflow-auto p-8">
        <div class="max-w-6xl mx-auto">
          <div class="flex items-center justify-between mb-6">
            <div>
              <h2 class="text-2xl font-bold text-zinc-900">Meeting Rooms</h2>
              <p class="text-zinc-500 mt-1 text-sm">Browse available rooms and their details.</p>
            </div>
            <a href="book-room.html"
              class="px-5 py-2.5 text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 rounded-xl transition-colors flex items-center gap-2 shadow-sm">
              <i class="fa-solid fa-plus text-xs"></i> Book a Room
            </a>
          </div>

          <!-- Loading -->
          <div id="loadingState" class="text-center py-16">
            <i class="fa-solid fa-spinner fa-spin text-2xl text-zinc-400"></i>
            <p class="text-zinc-400 text-sm mt-3">Loading rooms...</p>
          </div>

          <!-- Error -->
          <div id="errorState" class="hidden text-center py-16">
            <i class="fa-solid fa-circle-exclamation text-2xl text-red-400"></i>
            <p class="text-red-400 text-sm mt-3" id="errorMsg">Failed to load rooms.</p>
          </div>

          <!-- Rooms Grid -->
          <div id="roomsGrid" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5"></div>

          <!-- Empty -->
          <div id="emptyState" class="hidden text-center py-16 bg-white rounded-xl border border-zinc-200">
            <i class="fa-solid fa-door-open text-4xl text-zinc-300 mb-3"></i>
            <p class="text-zinc-500 font-medium">No rooms found</p>
          </div>
        </div>
      </main>

    </div>
  </div>

  <script>
    const API_URL =
      window.location.protocol === "file:" ||
      window.location.hostname === "localhost" ||
      window.location.hostname === "127.0.0.1"
        ? "http://localhost:3001/api"
        : "/api";

    const token = localStorage.getItem("token");
    const user = JSON.parse(localStorage.getItem("user") || "{}");
    if (!token) { window.location.href = "login.html"; }

    // User badge
    document.getElementById("avatar").textContent = user.name ? user.name.slice(0, 2).toUpperCase() : "??";
    document.getElementById("userName").textContent = user.name || "Guest";
    document.getElementById("userRole").textContent = { employee: "Employee", manager: "Manager", hr: "HR" }[user.role] || "";

    // Show nav for manager
    if (user.role === "manager") {
      document.getElementById("navMeetingApprovals").classList.remove("hidden");
      document.getElementById("navMeetingApprovals").classList.add("flex");
    }

    const facilitiesIcon = {
      "projector": "fa-video",
      "whiteboard": "fa-chalkboard",
      "video_conference": "fa-video",
      "tv": "fa-tv",
      "phone": "fa-phone",
      "wifi": "fa-wifi",
    };

    async function loadRooms() {
      try {
        const res = await fetch(`${API_URL}/rooms`, {
          headers: { Authorization: `Bearer ${token}` },
        });

        document.getElementById("loadingState").classList.add("hidden");

        if (!res.ok) {
          document.getElementById("errorState").classList.remove("hidden");
          document.getElementById("errorMsg").textContent = "Failed to load rooms.";
          return;
        }

        const rooms = await res.json();

        if (!rooms || rooms.length === 0) {
          document.getElementById("emptyState").classList.remove("hidden");
          return;
        }

        document.getElementById("roomsGrid").classList.remove("hidden");
        document.getElementById("roomsGrid").innerHTML = rooms.map(room => `
          <div class="bg-white rounded-xl border border-zinc-200 shadow-sm overflow-hidden hover:shadow-md transition-shadow">
            <!-- Room Header -->
            <div class="bg-gradient-to-r from-blue-600 to-blue-700 px-6 py-4">
              <div class="flex items-start justify-between">
                <div>
                  <p class="text-blue-200 text-xs font-medium uppercase tracking-wide">${room.room_id}</p>
                  <h3 class="text-white font-bold text-lg mt-1">${room.name}</h3>
                </div>
                <span class="px-2.5 py-1 text-xs font-semibold rounded-full ${room.status === 'active' ? 'bg-green-500/20 text-green-200' : 'bg-yellow-500/20 text-yellow-200'}">
                  ${room.status === 'active' ? 'Available' : 'Maintenance'}
                </span>
              </div>
            </div>

            <!-- Room Info -->
            <div class="px-6 py-4 space-y-3">
              <div class="flex items-center gap-3 text-sm text-zinc-600">
                <i class="fa-solid fa-users text-zinc-400 w-4 text-center"></i>
                <span><strong>${room.capacity}</strong> people</span>
                <span class="text-zinc-300">·</span>
                <i class="fa-solid fa-layer-group text-zinc-400 w-4 text-center"></i>
                <span>Floor ${room.floor}</span>
              </div>

              ${room.facilities && room.facilities.length > 0 ? `
                <div class="flex flex-wrap gap-2 pt-1">
                  ${room.facilities.map(f => `
                    <span class="px-2.5 py-1 text-xs bg-zinc-100 text-zinc-600 rounded-full flex items-center gap-1">
                      <i class="fa-solid ${facilitiesIcon[f] || 'fa-check'} text-zinc-400 text-xs"></i>
                      ${f.replace(/_/g, ' ')}
                    </span>
                  `).join("")}
                </div>
              ` : ""}

              <div class="pt-2 border-t border-zinc-100 flex items-center justify-between">
                <span class="text-xs text-zinc-400">${room.working_hours ? room.working_hours.join(", ") : "08:00 - 17:00"}</span>
                <a href="book-room.html?room=${room.room_id}"
                  class="text-sm text-blue-600 hover:text-blue-700 font-medium flex items-center gap-1">
                  Book now <i class="fa-solid fa-arrow-right text-xs"></i>
                </a>
              </div>
            </div>
          </div>
        `).join("");

      } catch (err) {
        document.getElementById("loadingState").classList.add("hidden");
        document.getElementById("errorState").classList.remove("hidden");
        document.getElementById("errorMsg").textContent = "Cannot connect to server.";
      }
    }

    loadRooms();

    document.getElementById("logoutBtn").addEventListener("click", () => {
      localStorage.clear();
      window.location.href = "login.html";
    });
  </script>

</body>
</html>
