<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Room Approvals - ApproveHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body class="bg-zinc-100 font-sans">

  <div class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-60 bg-zinc-900 flex flex-col shrink-0">
      <div class="px-6 py-5 border-b border-zinc-800">
        <h1 class="text-white text-lg font-bold tracking-tight">
          Approve<span class="text-blue-400">Hub</span>
        </h1>
        <p class="text-zinc-500 text-xs mt-0.5">Internal System</p>
      </div>

      <nav class="flex-1 px-3 py-4 space-y-1">
        <a href="index.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
          <i class="fa-solid fa-grip text-base w-5"></i> Dashboard
        </a>
        <a href="leave.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
          <i class="fa-solid fa-calendar-check text-base w-5"></i> Leave Request
        </a>
        <a href="approvals.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
          <i class="fa-solid fa-clipboard-check text-base w-5"></i> Approvals
        </a>
        <div class="my-2 border-t border-zinc-800"></div>
        <a href="rooms.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
          <i class="fa-solid fa-door-open text-base w-5"></i> Meeting Rooms
        </a>
        <a href="book-room.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
          <i class="fa-solid fa-calendar-plus text-base w-5"></i> Book Room
        </a>
        <a href="meeting-approvals.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium bg-blue-600 text-white">
          <i class="fa-solid fa-user-check text-base w-5"></i> Room Approvals
        </a>
      </nav>

      <div class="px-3 py-4 border-t border-zinc-800">
        <a href="#" id="logoutBtn" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
          <i class="fa-solid fa-right-from-bracket text-base w-5"></i> Sign Out
        </a>
      </div>
    </aside>

    <!-- Main Column -->
    <div class="flex flex-col flex-1 overflow-hidden">

      <!-- Header -->
      <header class="h-16 bg-white border-b border-zinc-200 flex items-center px-6 gap-4 shrink-0 shadow-sm">
        <h2 class="text-lg font-semibold text-zinc-800" id="pageTitle">Room Approvals</h2>
        <div class="flex-1"></div>
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-xs font-bold" id="avatar"></div>
          <div class="text-left hidden sm:block">
            <p class="text-sm font-semibold text-zinc-800 leading-none" id="userName"></p>
            <p class="text-xs text-zinc-400 mt-0.5" id="userRole"></p>
          </div>
        </div>
      </header>

      <!-- Content -->
      <main class="flex-1 overflow-auto p-8">
        <div class="max-w-5xl mx-auto">

          <!-- Token-based view (from email link) -->
          <div id="tokenView" class="hidden">
            <div class="flex items-center gap-3 mb-6">
              <a href="rooms.html" class="text-zinc-400 hover:text-zinc-600">
                <i class="fa-solid fa-arrow-left"></i>
              </a>
              <h2 class="text-xl font-bold text-zinc-900">Booking Request Details</h2>
            </div>
            <div class="bg-white rounded-xl border border-zinc-200 shadow-sm p-6 max-w-2xl">
              <div id="tokenDetails" class="space-y-3 text-sm text-zinc-600"></div>
              <div id="tokenActions" class="mt-6 flex gap-3"></div>
              <div id="tokenResult" class="mt-4"></div>
            </div>
          </div>

          <!-- Normal list view -->
          <div id="listView">
            <!-- Stats -->
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
              <div class="bg-white rounded-xl border border-zinc-200 p-5 shadow-sm">
                <p class="text-xs font-medium text-zinc-400 uppercase tracking-wide">Total</p>
                <p class="text-3xl font-bold text-zinc-900 mt-2" id="statTotal">0</p>
              </div>
              <div class="bg-white rounded-xl border border-zinc-200 p-5 shadow-sm">
                <p class="text-xs font-medium text-zinc-400 uppercase tracking-wide">Pending</p>
                <p class="text-3xl font-bold text-yellow-500 mt-2" id="statPending">0</p>
              </div>
              <div class="bg-white rounded-xl border border-zinc-200 p-5 shadow-sm">
                <p class="text-xs font-medium text-zinc-400 uppercase tracking-wide">Approved</p>
                <p class="text-3xl font-bold text-green-500 mt-2" id="statApproved">0</p>
              </div>
            </div>

            <!-- Tabs -->
            <div class="flex gap-2 mb-6">
              <button id="tabPending" class="px-4 py-2 text-sm font-medium rounded-lg bg-blue-600 text-white">Pending</button>
              <button id="tabApproved" class="px-4 py-2 text-sm font-medium rounded-lg bg-zinc-200 text-zinc-600 hover:bg-zinc-300">Approved</button>
              <button id="tabRejected" class="px-4 py-2 text-sm font-medium rounded-lg bg-zinc-200 text-zinc-600 hover:bg-zinc-300">Rejected</button>
            </div>

            <!-- Loading -->
            <div id="loadingState" class="text-center py-16">
              <i class="fa-solid fa-spinner fa-spin text-2xl text-zinc-400"></i>
              <p class="text-zinc-400 text-sm mt-3">Loading...</p>
            </div>

            <!-- Empty -->
            <div id="emptyState" class="hidden text-center py-16 bg-white rounded-xl border border-zinc-200">
              <i class="fa-solid fa-inbox text-4xl text-zinc-300 mb-3"></i>
              <p class="text-zinc-500 font-medium">No requests</p>
              <p class="text-zinc-400 text-sm mt-1">All caught up!</p>
            </div>

            <!-- List -->
            <div id="approvalsList" class="hidden space-y-4"></div>
          </div>

        </div>
      </main>

    </div>
  </div>

  <script>
    const API_URL = window.location.hostname === "localhost" ? "http://localhost:3001/api" : "https://api.internalautomation.io.vn/api";

    const token = localStorage.getItem("token");
    const user = JSON.parse(localStorage.getItem("user") || "{}");

    // Redirect non-managers to login (only managers can access this page normally)
    if (!token || user.role !== "manager") {
      window.location.href = "login.html";
    }

    document.getElementById("avatar").textContent = user.name ? user.name.slice(0, 2).toUpperCase() : "??";
    document.getElementById("userName").textContent = user.name || "Guest";
    document.getElementById("userRole").textContent = "Manager";

    const statusBadge = (status) => {
      const map = {
        pending: { bg: "bg-yellow-100", text: "text-yellow-700", label: "Pending" },
        approved: { bg: "bg-green-100", text: "text-green-700", label: "Approved" },
        rejected: { bg: "bg-red-100", text: "text-red-700", label: "Rejected" },
        cancelled: { bg: "bg-zinc-100", text: "text-zinc-500", label: "Cancelled" },
      };
      const s = map[status] || map.pending;
      return `<span class="px-2.5 py-1 text-xs font-semibold rounded-full ${s.bg} ${s.text}">${s.label}</span>`;
    };

    let currentTab = "pending";

    // Check URL for token (from email link)
    const urlParams = new URLSearchParams(window.location.search);
    const approvalToken = urlParams.get("token");

    if (approvalToken) {
      document.getElementById("listView").classList.add("hidden");
      document.getElementById("tokenView").classList.remove("hidden");
      document.getElementById("pageTitle").textContent = "Room Booking Approval";
      loadTokenRequest(approvalToken);
    } else {
      loadBookings();
    }

    async function loadTokenRequest(tokenVal) {
      try {
        const res = await fetch(`${API_URL}/bookings/token/${tokenVal}`);
        const data = await res.json();

        if (!res.ok) {
          document.getElementById("tokenDetails").innerHTML = `
            <div class="bg-red-50 border border-red-200 rounded-lg px-4 py-3 text-red-600">
              <i class="fa-solid fa-circle-exclamation mr-1"></i> ${data.message || "Invalid or expired token."}
            </div>`;
          return;
        }

        document.getElementById("tokenDetails").innerHTML = `
          <div class="grid grid-cols-2 gap-4">
            <div>
              <p class="text-xs text-zinc-400 uppercase tracking-wide">Booking ID</p>
              <p class="font-semibold text-zinc-800 font-mono">${data.booking_id}</p>
            </div>
            <div>
              <p class="text-xs text-zinc-400 uppercase tracking-wide">Status</p>
              <div class="mt-1">${statusBadge(data.status)}</div>
            </div>
            <div>
              <p class="text-xs text-zinc-400 uppercase tracking-wide">Requester</p>
              <p class="font-medium text-zinc-800">${data.requester_name}</p>
              <p class="text-xs text-zinc-500">${data.requester_email}</p>
            </div>
            <div>
              <p class="text-xs text-zinc-400 uppercase tracking-wide">Department</p>
              <p class="text-zinc-700">${data.department}</p>
            </div>
            <div>
              <p class="text-xs text-zinc-400 uppercase tracking-wide">Room</p>
              <p class="font-medium text-zinc-800">${data.room_name}</p>
            </div>
            <div>
              <p class="text-xs text-zinc-400 uppercase tracking-wide">Date</p>
              <p class="text-zinc-700">${data.meeting_date}</p>
            </div>
            <div>
              <p class="text-xs text-zinc-400 uppercase tracking-wide">Time</p>
              <p class="text-zinc-700">${data.start_time} – ${data.end_time}</p>
            </div>
            <div>
              <p class="text-xs text-zinc-400 uppercase tracking-wide">Attendees</p>
              <p class="text-zinc-700">${data.attendees} people</p>
            </div>
          </div>
          <div class="mt-4 pt-4 border-t border-zinc-100">
            <p class="text-xs text-zinc-400 uppercase tracking-wide">Purpose</p>
            <p class="text-zinc-700 mt-1">${data.purpose}</p>
            ${data.notes ? `<p class="text-zinc-500 text-xs mt-1"><i class="fa-solid fa-note-sticky mr-1"></i>${data.notes}</p>` : ""}
          </div>
        `;

        const actionsDiv = document.getElementById("tokenActions");
        const resultDiv = document.getElementById("tokenResult");

        if (data.status === "pending") {
          actionsDiv.innerHTML = `
            <button onclick="handleApproval('${tokenVal}', 'approve')"
              class="px-6 py-2.5 text-sm font-semibold text-white bg-green-600 hover:bg-green-700 rounded-xl transition-colors flex items-center gap-2 shadow-sm">
              <i class="fa-solid fa-check text-xs"></i> Approve
            </button>
            <button onclick="handleApproval('${tokenVal}', 'reject')"
              class="px-6 py-2.5 text-sm font-semibold text-white bg-red-600 hover:bg-red-700 rounded-xl transition-colors flex items-center gap-2 shadow-sm">
              <i class="fa-solid fa-xmark text-xs"></i> Reject
            </button>
          `;
        } else {
          resultDiv.innerHTML = `
            <div class="bg-zinc-50 border border-zinc-200 rounded-lg px-4 py-3 text-sm text-zinc-500">
              This request has already been <strong>${data.status}</strong>.
            </div>`;
        }
      } catch (err) {
        document.getElementById("tokenDetails").innerHTML = `
          <div class="bg-red-50 border border-red-200 rounded-lg px-4 py-3 text-red-600">
            Error loading request.
          </div>`;
      }
    }

    async function handleApproval(tokenVal, action) {
      const resultDiv = document.getElementById("tokenResult");
      resultDiv.innerHTML = `<p class="text-sm text-blue-500"><i class="fa-solid fa-spinner fa-spin mr-1"></i> Processing...</p>`;

      try {
        const res = await fetch(`${API_URL}/bookings/approve`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token: tokenVal, action }),
        });
        const data = await res.json();

        if (res.ok) {
          resultDiv.innerHTML = `
            <div class="bg-green-50 border border-green-200 rounded-lg px-4 py-3 text-green-700 text-sm font-medium">
              ✅ ${data.message}
            </div>`;
          // Reload to show updated status
          setTimeout(() => loadTokenRequest(tokenVal), 1000);
        } else {
          resultDiv.innerHTML = `
            <div class="bg-red-50 border border-red-200 rounded-lg px-4 py-3 text-red-600 text-sm">
              ❌ ${data.message}
            </div>`;
        }
      } catch {
        resultDiv.innerHTML = `
          <div class="bg-red-50 border border-red-200 rounded-lg px-4 py-3 text-red-600 text-sm">
            ❌ Connection error.
          </div>`;
      }
    }

    async function loadBookings() {
      document.getElementById("loadingState").classList.remove("hidden");
      document.getElementById("approvalsList").classList.add("hidden");
      document.getElementById("emptyState").classList.add("hidden");

      try {
        const res = await fetch(`${API_URL}/bookings`, {
          headers: { Authorization: `Bearer ${token}` },
        });

        document.getElementById("loadingState").classList.add("hidden");

        if (!res.ok) {
          document.getElementById("emptyState").classList.remove("hidden");
          return;
        }

        const data = await res.json();
        renderList(data);
      } catch (err) {
        document.getElementById("loadingState").classList.add("hidden");
        document.getElementById("emptyState").classList.remove("hidden");
      }
    }

    function renderList(bookings) {
      const filtered = bookings.filter(b => {
        if (currentTab === "pending") return b.status === "pending";
        if (currentTab === "approved") return b.status === "approved";
        if (currentTab === "rejected") return b.status === "rejected";
      });

      // Stats
      document.getElementById("statTotal").textContent = bookings.length;
      document.getElementById("statPending").textContent = bookings.filter(b => b.status === "pending").length;
      document.getElementById("statApproved").textContent = bookings.filter(b => b.status === "approved").length;

      const container = document.getElementById("approvalsList");
      const empty = document.getElementById("emptyState");

      if (filtered.length === 0) {
        container.classList.add("hidden");
        empty.classList.remove("hidden");
        return;
      }

      empty.classList.add("hidden");
      container.classList.remove("hidden");

      container.innerHTML = filtered.map(b => `
        <div class="bg-white rounded-xl border border-zinc-200 shadow-sm p-6 hover:shadow-md transition-shadow">
          <div class="flex items-start justify-between gap-4">
            <div class="flex items-start gap-4">
              <div class="w-12 h-12 rounded-xl bg-blue-100 flex items-center justify-center shrink-0">
                <i class="fa-solid fa-door-open text-blue-600 text-lg"></i>
              </div>
              <div>
                <div class="flex items-center gap-3 mb-1">
                  <span class="font-mono text-xs bg-zinc-100 text-zinc-600 px-2 py-0.5 rounded">${b.booking_id}</span>
                  ${statusBadge(b.status)}
                </div>
                <h4 class="font-semibold text-zinc-800">${b.room_name}</h4>
                <div class="flex flex-wrap gap-x-6 gap-y-1 mt-2 text-sm text-zinc-600">
                  <span><i class="fa-solid fa-user mr-2 text-zinc-400"></i>${b.requester_name} · ${b.department}</span>
                  <span><i class="fa-solid fa-calendar mr-2 text-zinc-400"></i>${b.meeting_date}</span>
                  <span><i class="fa-solid fa-clock mr-2 text-zinc-400"></i>${b.start_time} – ${b.end_time}</span>
                  <span><i class="fa-solid fa-users mr-2 text-zinc-400"></i>${b.attendees}</span>
                </div>
                <p class="text-sm text-zinc-500 mt-2"><i class="fa-solid fa-pen mr-1 text-zinc-400"></i>${b.purpose}</p>
              </div>
            </div>

            <div class="flex flex-col items-end gap-2 shrink-0">
              ${statusBadge(b.status)}
              ${b.status === "pending" ? `
                <div class="flex gap-2 mt-2">
                  <button onclick="quickApprove('${b.managerApprovalToken}')"
                    class="px-4 py-1.5 text-xs font-semibold text-white bg-green-600 hover:bg-green-700 rounded-lg transition-colors">
                    <i class="fa-solid fa-check mr-1"></i>Approve
                  </button>
                  <button onclick="quickReject('${b.managerApprovalToken}')"
                    class="px-4 py-1.5 text-xs font-semibold text-white bg-red-600 hover:bg-red-700 rounded-lg transition-colors">
                    <i class="fa-solid fa-xmark mr-1"></i>Reject
                  </button>
                </div>
              ` : ""}
            </div>
          </div>
        </div>
      `).join("");
    }

    async function quickApprove(tokenVal) {
      await handleApproval(tokenVal, "approve");
      loadBookings();
    }

    async function quickReject(tokenVal) {
      await handleApproval(tokenVal, "reject");
      loadBookings();
    }

    // Tabs
    ["Pending", "Approved", "Rejected"].forEach(tab => {
      const btn = document.getElementById(`tab${tab}`);
      btn.addEventListener("click", () => {
        currentTab = tab.toLowerCase();
        document.querySelectorAll("[id^=tab]").forEach(b => {
          b.className = "px-4 py-2 text-sm font-medium rounded-lg bg-zinc-200 text-zinc-600 hover:bg-zinc-300";
        });
        btn.className = "px-4 py-2 text-sm font-medium rounded-lg bg-blue-600 text-white";
        loadBookings();
      });
    });

    document.getElementById("logoutBtn").addEventListener("click", () => {
      localStorage.clear();
      window.location.href = "login.html";
    });
  </script>

</body>
</html>
