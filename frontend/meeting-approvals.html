<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Room Approvals - ApproveHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body class="bg-zinc-100 font-sans">
 
  <div class="flex h-screen overflow-hidden">
 
    <!-- Sidebar -->
    <aside class="w-60 bg-zinc-900 flex flex-col shrink-0">
      <div class="px-6 py-5 border-b border-zinc-800">
        <h1 class="text-white text-lg font-bold tracking-tight">
          Approve<span class="text-blue-400">Hub</span>
        </h1>
        <p class="text-zinc-500 text-xs mt-0.5">Internal System</p>
      </div>
      <nav class="flex-1 px-3 py-4 space-y-1">
        <a href="index.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
          <i class="fa-solid fa-grip text-base w-5"></i> Dashboard
        </a>
        <a href="leave.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
          <i class="fa-solid fa-calendar-check text-base w-5"></i> Leave Request
        </a>
        <a href="approvals.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
          <i class="fa-solid fa-clipboard-check text-base w-5"></i> Approvals
        </a>
        <div class="my-2 border-t border-zinc-800"></div>
        <a href="rooms.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
          <i class="fa-solid fa-door-open text-base w-5"></i> Meeting Rooms
        </a>
        <a href="book-room.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
          <i class="fa-solid fa-calendar-plus text-base w-5"></i> Book Room
        </a>
        <a href="booking-dashboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
          <i class="fa-solid fa-list text-base w-5"></i> My Bookings
        </a>
        <a href="meeting-approvals.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium bg-blue-600 text-white">
          <i class="fa-solid fa-user-check text-base w-5"></i> Room Approvals
        </a>
      </nav>
      <div class="px-3 py-4 border-t border-zinc-800">
        <a href="#" id="logoutBtn" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
          <i class="fa-solid fa-right-from-bracket text-base w-5"></i> Sign Out
        </a>
      </div>
    </aside>
 
    <!-- Main Column -->
    <div class="flex flex-col flex-1 overflow-hidden">
      <!-- Header -->
      <header class="h-16 bg-white border-b border-zinc-200 flex items-center px-6 gap-4 shrink-0 shadow-sm">
        <h2 class="text-lg font-semibold text-zinc-800" id="pageTitle">Room Approvals</h2>
        <div class="flex-1"></div>
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-xs font-bold" id="avatar"></div>
          <div class="text-left hidden sm:block">
            <p class="text-sm font-semibold text-zinc-800 leading-none" id="userName"></p>
            <p class="text-xs text-zinc-400 mt-0.5" id="userRole"></p>
          </div>
        </div>
      </header>
 
      <!-- Content -->
      <main class="flex-1 overflow-auto p-8">
        <div class="max-w-5xl mx-auto">
 
          <!-- ── Token View (từ email link) ── -->
          <div id="tokenView" class="hidden">
            <div class="flex items-center gap-3 mb-6">
              <a href="meeting-approvals.html" class="text-zinc-400 hover:text-zinc-600">
                <i class="fa-solid fa-arrow-left"></i>
              </a>
              <h2 class="text-xl font-bold text-zinc-900">Booking Request Details</h2>
            </div>
 
            <!-- Loading token -->
            <div id="tokenLoading" class="text-center py-12">
              <i class="fa-solid fa-spinner fa-spin text-2xl text-zinc-400"></i>
              <p class="text-zinc-400 text-sm mt-3">Loading booking details...</p>
            </div>
 
            <div id="tokenCard" class="hidden bg-white rounded-2xl border border-zinc-200 shadow-sm overflow-hidden max-w-2xl">
              <!-- Header card -->
              <div id="tokenCardHeader" class="px-6 py-4 border-b border-zinc-100"></div>
 
              <!-- Details -->
              <div class="px-6 py-5 space-y-3" id="tokenDetails"></div>
 
              <!-- Actions -->
              <div class="px-6 py-5 border-t border-zinc-100 bg-zinc-50">
                <div id="tokenActions"></div>
                <div id="tokenResult" class="mt-3"></div>
              </div>
            </div>
          </div>
 
          <!-- ── List View (manager dashboard) ── -->
          <div id="listView">
            <!-- Stats -->
            <div class="grid grid-cols-1 sm:grid-cols-4 gap-4 mb-8">
              <div class="bg-white rounded-xl border border-zinc-200 p-5 shadow-sm">
                <p class="text-xs font-medium text-zinc-400 uppercase tracking-wide">Total</p>
                <p class="text-3xl font-bold text-zinc-900 mt-2" id="statTotal">0</p>
              </div>
              <div class="bg-white rounded-xl border border-zinc-200 p-5 shadow-sm">
                <p class="text-xs font-medium text-zinc-400 uppercase tracking-wide">Pending</p>
                <p class="text-3xl font-bold text-yellow-500 mt-2" id="statPending">0</p>
              </div>
              <div class="bg-white rounded-xl border border-zinc-200 p-5 shadow-sm">
                <p class="text-xs font-medium text-zinc-400 uppercase tracking-wide">Approved</p>
                <p class="text-3xl font-bold text-green-500 mt-2" id="statApproved">0</p>
              </div>
              <div class="bg-white rounded-xl border border-zinc-200 p-5 shadow-sm">
                <p class="text-xs font-medium text-zinc-400 uppercase tracking-wide">Rejected</p>
                <p class="text-3xl font-bold text-red-500 mt-2" id="statRejected">0</p>
              </div>
            </div>
 
            <!-- Tabs -->
            <div class="flex gap-2 mb-6">
              <button id="tabPending" class="px-4 py-2 text-sm font-medium rounded-lg bg-blue-600 text-white">
                <i class="fa-solid fa-clock mr-1"></i>Pending
              </button>
              <button id="tabApproved" class="px-4 py-2 text-sm font-medium rounded-lg bg-zinc-200 text-zinc-600 hover:bg-zinc-300">
                <i class="fa-solid fa-check mr-1"></i>Approved
              </button>
              <button id="tabRejected" class="px-4 py-2 text-sm font-medium rounded-lg bg-zinc-200 text-zinc-600 hover:bg-zinc-300">
                <i class="fa-solid fa-xmark mr-1"></i>Rejected
              </button>
              <button id="tabAll" class="px-4 py-2 text-sm font-medium rounded-lg bg-zinc-200 text-zinc-600 hover:bg-zinc-300">All</button>
            </div>
 
            <!-- Loading -->
            <div id="loadingState" class="text-center py-16">
              <i class="fa-solid fa-spinner fa-spin text-2xl text-zinc-400"></i>
              <p class="text-zinc-400 text-sm mt-3">Loading...</p>
            </div>
 
            <!-- Empty -->
            <div id="emptyState" class="hidden text-center py-16 bg-white rounded-xl border border-zinc-200">
              <i class="fa-solid fa-inbox text-4xl text-zinc-300 mb-3"></i>
              <p class="text-zinc-500 font-medium">No requests found</p>
              <p class="text-zinc-400 text-sm mt-1">All caught up!</p>
            </div>
 
            <!-- List -->
            <div id="approvalsList" class="hidden space-y-4"></div>
          </div>
 
        </div>
      </main>
    </div>
  </div>
 
  <script>
    const API_URL =
      window.location.protocol === "file:" ||
      window.location.hostname === "localhost" ||
      window.location.hostname === "127.0.0.1"
        ? "http://localhost:3001/api"
        : "/api";
    const token = localStorage.getItem("token");
    const user = JSON.parse(localStorage.getItem("user") || "{}");
 
    const urlParams = new URLSearchParams(window.location.search);
    const approvalToken = urlParams.get("token");
    const quickAction = urlParams.get("action");
 
    // Allow access if: manager logged in, OR coming from email link with token
    if (!approvalToken && (!token || user.role !== "manager")) {
      window.location.href = "login.html";
    }
 
    if (user.name) {
      document.getElementById("avatar").textContent = user.name.slice(0,2).toUpperCase();
      document.getElementById("userName").textContent = user.name;
      document.getElementById("userRole").textContent = "Manager";
    }
 
    // ── Badge helpers ──
    const statusBadge = (status) => {
      const map = {
        pending:   { bg: "bg-yellow-100", text: "text-yellow-700", label: "Pending",   icon: "fa-clock" },
        pending_urgent: { bg: "bg-orange-100", text: "text-orange-700", label: "Pending (Urgent)", icon: "fa-bolt" },
        approved:  { bg: "bg-green-100",  text: "text-green-700",  label: "Approved",  icon: "fa-check" },
        rejected:  { bg: "bg-red-100",    text: "text-red-700",    label: "Rejected",  icon: "fa-xmark" },
        cancelled: { bg: "bg-zinc-100",   text: "text-zinc-500",   label: "Cancelled", icon: "fa-ban" },
      };
      const s = map[status] || map.pending;
      return `<span class="px-2.5 py-1 text-xs font-semibold rounded-full ${s.bg} ${s.text} inline-flex items-center gap-1">
        <i class="fa-solid ${s.icon} text-xs"></i>${s.label}</span>`;
    };
 
    const priorityBadge = (p) => {
      const map = {
        urgent: "bg-red-100 text-red-700",
        high:   "bg-orange-100 text-orange-700",
        normal: "bg-blue-100 text-blue-700",
      };
      const label = { urgent: "🔴 Urgent", high: "🟠 High", normal: "🔵 Normal" };
      return p ? `<span class="px-2 py-0.5 text-xs font-medium rounded-full ${map[p] || map.normal}">${label[p] || p}</span>` : "";
    };
 
    // ─────────────────────────────────────────────
    // TOKEN VIEW — from email link
    // ─────────────────────────────────────────────
    if (approvalToken) {
      document.getElementById("listView").classList.add("hidden");
      document.getElementById("tokenView").classList.remove("hidden");
      document.getElementById("pageTitle").textContent = "Room Booking Approval";
      loadTokenRequest(approvalToken);
    } else {
      loadBookings();
    }
 
    async function loadTokenRequest(tok) {
      try {
        const res = await fetch(`${API_URL}/meeting-room/token/${tok}`);
        const data = await res.json();
 
        document.getElementById("tokenLoading").classList.add("hidden");
        document.getElementById("tokenCard").classList.remove("hidden");
 
        if (!res.ok) {
          document.getElementById("tokenCardHeader").innerHTML = `
            <div class="bg-red-50 rounded-lg px-4 py-3 text-red-600 text-sm">❌ ${data.message}</div>`;
          return;
        }
 
        // Header
        const headerColor = data.status === "approved" ? "bg-green-600" : data.status === "rejected" ? "bg-red-600" : "bg-blue-600";
        document.getElementById("tokenCardHeader").innerHTML = `
          <div class="${headerColor} -mx-6 -my-4 px-6 py-4 flex items-center justify-between">
            <div>
              <h3 class="text-white font-semibold text-lg">${data.room_name}</h3>
              <p class="text-white/70 text-sm">${data.booking_id}</p>
            </div>
            <div>${statusBadge(data.status)}</div>
          </div>`;
 
        // Details
        document.getElementById("tokenDetails").innerHTML = `
          <div class="grid grid-cols-2 gap-x-6 gap-y-3 text-sm">
            <div>
              <p class="text-xs text-zinc-400 mb-0.5">Người đặt</p>
              <p class="font-medium text-zinc-800">${data.requester_name}</p>
            </div>
            <div>
              <p class="text-xs text-zinc-400 mb-0.5">Phòng ban</p>
              <p class="font-medium text-zinc-800">${data.department || "N/A"}</p>
            </div>
            <div>
              <p class="text-xs text-zinc-400 mb-0.5">Email</p>
              <p class="font-medium text-zinc-800">${data.requester_email}</p>
            </div>
            <div>
              <p class="text-xs text-zinc-400 mb-0.5">Phòng họp</p>
              <p class="font-medium text-zinc-800">${data.room_name}</p>
            </div>
            <div>
              <p class="text-xs text-zinc-400 mb-0.5">Ngày</p>
              <p class="font-medium text-zinc-800">${data.meeting_date}</p>
            </div>
            <div>
              <p class="text-xs text-zinc-400 mb-0.5">Thời gian</p>
              <p class="font-medium text-zinc-800">${data.start_time} – ${data.end_time}</p>
            </div>
            <div>
              <p class="text-xs text-zinc-400 mb-0.5">Số người</p>
              <p class="font-medium text-zinc-800">${data.attendees} người</p>
            </div>
            <div>
              <p class="text-xs text-zinc-400 mb-0.5">Ưu tiên</p>
              <p>${priorityBadge(data.priority) || "—"}</p>
            </div>
            <div class="col-span-2">
              <p class="text-xs text-zinc-400 mb-0.5">Mục đích</p>
              <p class="font-medium text-zinc-800">${data.purpose}</p>
            </div>
            ${data.notes ? `<div class="col-span-2">
              <p class="text-xs text-zinc-400 mb-0.5">Ghi chú</p>
              <p class="text-zinc-700">${data.notes}</p>
            </div>` : ""}
            ${data.equipment_needed ? `<div class="col-span-2">
              <p class="text-xs text-zinc-400 mb-0.5">Thiết bị cần</p>
              <p class="font-medium text-zinc-800">${data.equipment_needed}</p>
            </div>` : ""}
          </div>`;
 
        // Actions
        const actionsDiv = document.getElementById("tokenActions");
        const resultDiv = document.getElementById("tokenResult");
 
        if (data.status === "pending") {
          actionsDiv.innerHTML = `
            <div class="flex gap-3">
              <button onclick="handleApproval('${tok}', 'approve')"
                class="flex-1 py-3 text-sm font-semibold text-white bg-green-600 hover:bg-green-700 rounded-xl transition-colors flex items-center justify-center gap-2">
                <i class="fa-solid fa-check"></i> Phê duyệt
              </button>
              <button onclick="handleApproval('${tok}', 'reject')"
                class="flex-1 py-3 text-sm font-semibold text-white bg-red-600 hover:bg-red-700 rounded-xl transition-colors flex items-center justify-center gap-2">
                <i class="fa-solid fa-xmark"></i> Từ chối
              </button>
            </div>`;
 
          // Auto-action from URL param (e.g. ?token=xxx&action=reject)
          if (quickAction === "approve" || quickAction === "reject") {
            handleApproval(tok, quickAction);
          }
        } else {
          actionsDiv.innerHTML = `
            <div class="bg-zinc-50 border border-zinc-200 rounded-xl px-4 py-3 text-sm text-zinc-500 text-center">
              Yêu cầu này đã được xử lý: ${statusBadge(data.status)}
            </div>`;
        }
 
        // Show decided time
        if (data.manager_decided_at) {
          resultDiv.innerHTML = `<p class="text-xs text-zinc-400 mt-2 text-center">Xử lý lúc: ${new Date(data.manager_decided_at).toLocaleString("vi-VN")}</p>`;
        }
 
      } catch (err) {
        document.getElementById("tokenLoading").classList.add("hidden");
        document.getElementById("tokenCard").classList.remove("hidden");
        document.getElementById("tokenCardHeader").innerHTML = `
          <div class="bg-red-50 rounded-lg px-4 py-3 text-red-600 text-sm">❌ Không thể tải thông tin booking.</div>`;
      }
    }
 
    async function handleApproval(tok, action) {
      const resultDiv = document.getElementById("tokenResult");
      const actionsDiv = document.getElementById("tokenActions");
 
      actionsDiv.innerHTML = `<p class="text-sm text-blue-500 text-center py-2"><i class="fa-solid fa-spinner fa-spin mr-1"></i> Đang xử lý...</p>`;
 
      try {
        const res = await fetch(`${API_URL}/meeting-room/approve`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token: tok, action }),
        });
        const data = await res.json();
 
        if (res.ok) {
          const isApproved = action === "approve";
          actionsDiv.innerHTML = `
            <div class="${isApproved ? "bg-green-50 border-green-200" : "bg-red-50 border-red-200"} border rounded-xl px-4 py-4 text-center">
              <p class="text-2xl mb-1">${isApproved ? "✅" : "❌"}</p>
              <p class="${isApproved ? "text-green-700" : "text-red-700"} font-semibold text-sm">${data.message}</p>
            </div>`;
          setTimeout(() => loadTokenRequest(tok), 1500);
        } else {
          actionsDiv.innerHTML = `
            <div class="bg-red-50 border border-red-200 rounded-xl px-4 py-3 text-red-600 text-sm text-center">
              ❌ ${data.message}
            </div>`;
        }
      } catch {
        actionsDiv.innerHTML = `
          <div class="bg-red-50 border border-red-200 rounded-xl px-4 py-3 text-red-600 text-sm text-center">
            ❌ Lỗi kết nối.
          </div>`;
      }
    }
 
    // ─────────────────────────────────────────────
    // LIST VIEW — manager dashboard
    // ─────────────────────────────────────────────
    let currentTab = "pending";
    let allBookings = [];
 
    async function loadBookings() {
      document.getElementById("loadingState").classList.remove("hidden");
      document.getElementById("approvalsList").classList.add("hidden");
      document.getElementById("emptyState").classList.add("hidden");
 
      try {
        const res = await fetch(`${API_URL}/meeting-room`, {
          headers: { Authorization: `Bearer ${token}` },
        });
        document.getElementById("loadingState").classList.add("hidden");
        if (!res.ok) { document.getElementById("emptyState").classList.remove("hidden"); return; }
        allBookings = await res.json();
        renderList();
      } catch {
        document.getElementById("loadingState").classList.add("hidden");
        document.getElementById("emptyState").classList.remove("hidden");
      }
    }
 
    function renderList() {
      const filtered = allBookings.filter(b => {
        if (currentTab === "all") return true;
        return b.status === currentTab;
      });
 
      document.getElementById("statTotal").textContent = allBookings.length;
      document.getElementById("statPending").textContent = allBookings.filter(b => b.status === "pending").length;
      document.getElementById("statApproved").textContent = allBookings.filter(b => b.status === "approved").length;
      document.getElementById("statRejected").textContent = allBookings.filter(b => b.status === "rejected").length;
 
      const container = document.getElementById("approvalsList");
      const empty = document.getElementById("emptyState");
 
      if (filtered.length === 0) {
        container.classList.add("hidden");
        empty.classList.remove("hidden");
        return;
      }
 
      empty.classList.add("hidden");
      container.classList.remove("hidden");
 
      container.innerHTML = filtered.map(b => `
        <div class="bg-white rounded-xl border border-zinc-200 shadow-sm p-6 hover:shadow-md transition-shadow">
          <div class="flex items-start justify-between gap-4">
            <div class="flex items-start gap-4">
              <div class="w-12 h-12 rounded-xl bg-blue-100 flex items-center justify-center shrink-0">
                <i class="fa-solid fa-door-open text-blue-600 text-lg"></i>
              </div>
              <div class="flex-1">
                <div class="flex items-center flex-wrap gap-2 mb-1">
                  <span class="font-mono text-xs bg-zinc-100 text-zinc-600 px-2 py-0.5 rounded">${b.booking_id}</span>
                  ${statusBadge(b.status)}
                  ${priorityBadge(b.priority)}
                </div>
                <h4 class="font-semibold text-zinc-800 text-base">${b.room_name}</h4>
                <div class="flex flex-wrap gap-x-5 gap-y-1.5 mt-2 text-sm text-zinc-600">
                  <span><i class="fa-solid fa-user mr-1.5 text-zinc-400"></i>${b.requester_name}
                    <span class="text-zinc-400 text-xs ml-1">(${b.department || "N/A"})</span>
                  </span>
                  <span><i class="fa-solid fa-calendar mr-1.5 text-zinc-400"></i>${b.meeting_date}</span>
                  <span><i class="fa-solid fa-clock mr-1.5 text-zinc-400"></i>${b.start_time} – ${b.end_time}</span>
                  <span><i class="fa-solid fa-users mr-1.5 text-zinc-400"></i>${b.attendees} người</span>
                </div>
                <p class="text-sm text-zinc-500 mt-2">
                  <i class="fa-solid fa-pen mr-1 text-zinc-400"></i>${b.purpose}
                </p>
                ${b.notes ? `<p class="text-xs text-zinc-400 mt-1"><i class="fa-solid fa-note-sticky mr-1"></i>${b.notes}</p>` : ""}
              </div>
            </div>
 
            <div class="flex flex-col items-end gap-2 shrink-0">
              <p class="text-xs text-zinc-400">${new Date(b.createdAt).toLocaleDateString("vi-VN")}</p>
              ${b.status === "pending" ? `
                <div class="flex gap-2 mt-1">
                  <button onclick="quickApprove('${b.managerApprovalToken}', this)"
                    class="px-4 py-2 text-xs font-semibold text-white bg-green-600 hover:bg-green-700 rounded-lg transition-colors flex items-center gap-1">
                    <i class="fa-solid fa-check"></i>Approve
                  </button>
                  <button onclick="quickReject('${b.managerApprovalToken}', this)"
                    class="px-4 py-2 text-xs font-semibold text-white bg-red-600 hover:bg-red-700 rounded-lg transition-colors flex items-center gap-1">
                    <i class="fa-solid fa-xmark"></i>Reject
                  </button>
                </div>
              ` : `
                <p class="text-xs ${b.status === "approved" ? "text-green-600" : "text-red-600"}">
                  <i class="fa-solid ${b.status === "approved" ? "fa-check" : "fa-xmark"} mr-1"></i>
                  ${b.status === "approved" ? "Approved" : "Rejected"}
                  ${b.manager_decided_at ? `<br><span class="text-zinc-400">${new Date(b.manager_decided_at).toLocaleDateString("vi-VN")}</span>` : ""}
                </p>
              `}
            </div>
          </div>
        </div>
      `).join("");
    }
 
    async function quickApprove(tok, btn) {
      if (!tok) return;
      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
      try {
        const res = await fetch(`${API_URL}/meeting-room/approve`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token: tok, action: "approve" }),
        });
        const data = await res.json();
        if (res.ok) {
          showToast("✅ " + data.message, "green");
          loadBookings();
        } else {
          showToast("❌ " + data.message, "red");
          btn.disabled = false;
          btn.innerHTML = '<i class="fa-solid fa-check"></i>Approve';
        }
      } catch {
        showToast("❌ Lỗi kết nối", "red");
      }
    }
 
    async function quickReject(tok, btn) {
      if (!tok) return;
      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
      try {
        const res = await fetch(`${API_URL}/meeting-room/approve`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token: tok, action: "reject" }),
        });
        const data = await res.json();
        if (res.ok) {
          showToast("❌ " + data.message, "orange");
          loadBookings();
        } else {
          showToast("⚠️ " + data.message, "yellow");
          btn.disabled = false;
          btn.innerHTML = '<i class="fa-solid fa-xmark"></i>Reject';
        }
      } catch {
        showToast("❌ Lỗi kết nối", "red");
      }
    }
 
    // Toast notification
    function showToast(msg, color) {
      const colorMap = { green: "bg-green-600", red: "bg-red-600", orange: "bg-orange-500", yellow: "bg-yellow-500" };
      const toast = document.createElement("div");
      toast.className = `fixed bottom-6 right-6 ${colorMap[color] || "bg-zinc-800"} text-white text-sm font-medium px-5 py-3 rounded-xl shadow-lg z-50 transition-all`;
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3500);
    }
 
    // Tabs
    ["Pending", "Approved", "Rejected", "All"].forEach(tab => {
      const btn = document.getElementById(`tab${tab}`);
      if (!btn) return;
      btn.addEventListener("click", () => {
        currentTab = tab.toLowerCase();
        document.querySelectorAll("[id^=tab]").forEach(b => {
          b.className = "px-4 py-2 text-sm font-medium rounded-lg bg-zinc-200 text-zinc-600 hover:bg-zinc-300";
        });
        btn.className = "px-4 py-2 text-sm font-medium rounded-lg bg-blue-600 text-white";
        renderList();
      });
    });
 
    document.getElementById("logoutBtn").addEventListener("click", () => {
      localStorage.clear();
      window.location.href = "login.html";
    });
  </script>
 
</body>
