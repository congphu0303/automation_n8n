<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leave Request - ApproveHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body class="bg-zinc-100 font-sans">

  <div class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-60 bg-zinc-900 flex flex-col shrink-0">
      <div class="px-6 py-5 border-b border-zinc-800">
        <h1 class="text-white text-lg font-bold tracking-tight">
          Approve<span class="text-blue-400">Hub</span>
        </h1>
        <p class="text-zinc-500 text-xs mt-0.5">Internal System</p>
      </div>

      <nav class="flex-1 px-3 py-4 space-y-1">
        <a href="index.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
          <i class="fa-solid fa-grip text-base w-5"></i> Dashboard
        </a>
        <a href="leave.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium bg-blue-600 text-white">
          <i class="fa-solid fa-calendar-check text-base w-5"></i> Leave Request
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
          <i class="fa-solid fa-door-open text-base w-5"></i> Room Booking
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
          <i class="fa-solid fa-gear text-base w-5"></i> Settings
        </a>
      </nav>

      <div class="px-3 py-4 border-t border-zinc-800">
        <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
          <i class="fa-solid fa-right-from-bracket text-base w-5"></i> Sign Out
        </a>
      </div>
    </aside>

    <!-- Main Column -->
    <div class="flex flex-col flex-1 overflow-hidden">

      <!-- Header -->
      <header class="h-16 bg-white border-b border-zinc-200 flex items-center px-6 gap-4 shrink-0 shadow-sm">
        <div class="flex-1 max-w-md flex items-center gap-2 bg-zinc-100 border border-zinc-200 rounded-lg px-3 py-2">
          <i class="fa-solid fa-magnifying-glass text-zinc-400 text-sm"></i>
          <input type="text" placeholder="Search requests, rooms..." class="flex-1 bg-transparent text-sm text-zinc-700 outline-none placeholder:text-zinc-400" />
        </div>

        <div class="flex-1"></div>

        <button class="relative p-2 text-zinc-500 hover:text-zinc-800 hover:bg-zinc-100 rounded-lg transition-colors">
          <i class="fa-solid fa-bell text-lg"></i>
          <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full"></span>
        </button>

        <button class="flex items-center gap-2 px-3 py-1.5 rounded-lg hover:bg-zinc-100 transition-colors">
          <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-xs font-bold">PN</div>
          <div class="text-left hidden sm:block">
            <p class="text-sm font-semibold text-zinc-800 leading-none">Phu Nguyen</p>
            <p class="text-xs text-zinc-400 mt-0.5">Software Engineer</p>
          </div>
          <i class="fa-solid fa-chevron-down text-zinc-400 text-xs hidden sm:block"></i>
        </button>
      </header>

      <!-- Content -->
      <main class="flex-1 overflow-auto p-8">
        <div class="max-w-2xl mx-auto">

          <!-- Page Title -->
          <div class="mb-6">
            <h2 class="text-2xl font-bold text-zinc-900">Leave Request</h2>
            <p class="text-zinc-500 mt-1 text-sm">Submit your time-off application for approval.</p>
          </div>

          <!-- Form Card -->
          <div class="bg-white rounded-2xl border border-zinc-200 shadow-sm overflow-hidden">

            <!-- Form Header -->
            <div class="px-8 py-5 border-b border-zinc-100 bg-zinc-50">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-blue-100 flex items-center justify-center">
                  <i class="fa-solid fa-calendar-days text-blue-600 text-lg"></i>
                </div>
                <div>
                  <h3 class="font-semibold text-zinc-800">New Leave Application</h3>
                  <p class="text-xs text-zinc-400 mt-0.5">All fields marked with * are required</p>
                </div>
              </div>
            </div>

            <!-- Form Body -->
            <form id="leaveForm" class="p-8 space-y-6">

              <!-- Row 1: Name + Email -->
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                <div class="space-y-2">
                  <label for="employee_name" class="block text-sm font-medium text-zinc-700">
                    Full Name <span class="text-red-500">*</span>
                  </label>
                  <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400">
                      <i class="fa-solid fa-user text-sm"></i>
                    </span>
                    <input
                      type="text"
                      id="employee_name"
                      name="employee_name"
                      required
                      placeholder="Phu Nguyen"
                      class="w-full pl-10 pr-4 py-2.5 text-sm border border-zinc-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all placeholder:text-zinc-400"
                    />
                  </div>
                </div>

                <div class="space-y-2">
                  <label for="employee_email" class="block text-sm font-medium text-zinc-700">
                    Email <span class="text-red-500">*</span>
                  </label>
                  <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400">
                      <i class="fa-solid fa-envelope text-sm"></i>
                    </span>
                    <input
                      type="email"
                      id="employee_email"
                      name="employee_email"
                      required
                      placeholder="phu@company.com"
                      class="w-full pl-10 pr-4 py-2.5 text-sm border border-zinc-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all placeholder:text-zinc-400"
                    />
                  </div>
                </div>
              </div>

              <!-- Row 2: Department -->
              <div class="space-y-2">
                <label for="department" class="block text-sm font-medium text-zinc-700">
                  Department <span class="text-red-500">*</span>
                </label>
                <div class="relative">
                  <span class="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400 z-10">
                    <i class="fa-solid fa-building text-sm"></i>
                  </span>
                  <select
                    id="department"
                    name="department"
                    required
                    class="w-full pl-10 pr-10 py-2.5 text-sm border border-zinc-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all bg-white appearance-none cursor-pointer"
                  >
                    <option value="" disabled selected>Select department</option>
                    <option value="IT">IT</option>
                    <option value="Marketing">Marketing</option>
                    <option value="Finance">Finance</option>
                    <option value="Sales">Sales</option>
                  </select>
                  <span class="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-400 pointer-events-none">
                    <i class="fa-solid fa-chevron-down text-xs"></i>
                  </span>
                </div>
              </div>

              <!-- Row 3: Leave Date + Days -->
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                <div class="space-y-2">
                  <label for="leave_date" class="block text-sm font-medium text-zinc-700">
                    Leave Date <span class="text-red-500">*</span>
                  </label>
                  <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400">
                      <i class="fa-solid fa-calendar text-sm"></i>
                    </span>
                    <input
                      type="date"
                      id="leave_date"
                      name="leave_date"
                      required
                      class="w-full pl-10 pr-4 py-2.5 text-sm border border-zinc-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all"
                    />
                  </div>
                </div>

                <div class="space-y-2">
                  <label for="leave_days" class="block text-sm font-medium text-zinc-700">
                    Number of Days <span class="text-red-500">*</span>
                  </label>
                  <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400">
                      <i class="fa-solid fa-clock text-sm"></i>
                    </span>
                    <input
                      type="number"
                      id="leave_days"
                      name="leave_days"
                      required
                      min="1"
                      max="30"
                      placeholder="e.g. 2"
                      class="w-full pl-10 pr-4 py-2.5 text-sm border border-zinc-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all placeholder:text-zinc-400"
                    />
                  </div>
                </div>
              </div>

              <!-- Row 4: Reason -->
              <div class="space-y-2">
                <label for="reason" class="block text-sm font-medium text-zinc-700">
                  Reason <span class="text-red-500">*</span>
                </label>
                <div class="relative">
                  <span class="absolute left-3 top-3 text-zinc-400">
                    <i class="fa-solid fa-pen text-sm"></i>
                  </span>
                  <textarea
                    id="reason"
                    name="reason"
                    required
                    rows="4"
                    placeholder="Describe your reason for leave..."
                    class="w-full pl-10 pr-4 py-2.5 text-sm border border-zinc-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all placeholder:text-zinc-400 resize-none"
                  ></textarea>
                </div>
              </div>

              <!-- Divider -->
              <div class="border-t border-zinc-100"></div>

              <!-- Actions -->
              <div class="flex items-center justify-end gap-3">
                <a
                  href="index.html"
                  class="px-6 py-2.5 text-sm font-medium text-zinc-600 bg-zinc-100 hover:bg-zinc-200 rounded-xl transition-colors"
                >
                  Cancel
                </a>
                <button
                  type="submit"
                  class="px-6 py-2.5 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-xl transition-colors flex items-center gap-2 shadow-sm"
                >
                  <i class="fa-solid fa-paper-plane text-xs"></i>
                  Submit Request
                </button>
              </div>

            </form>
          </div>

        </div>
      </main>

    </div>
  </div>

</body>
</html>
