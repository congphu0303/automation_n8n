<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leave Request - ApproveHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="layout.css" />
</head>
<body class="bg-zinc-100 font-sans">

  <div class="flex h-screen overflow-hidden">

    <!-- Sidebar (static, not loaded via sidebar.js) -->
    <aside class="w-60 bg-zinc-900 flex flex-col shrink-0">
      <div class="px-6 py-5 border-b border-zinc-800">
        <h1 class="text-white text-lg font-bold tracking-tight">
          Approve<span class="text-blue-400">Hub</span>
        </h1>
        <p class="text-zinc-500 text-xs mt-0.5">Internal System</p>
      </div>
      <nav class="flex-1 min-h-0 px-3 py-4 space-y-1 overflow-y-auto">
        <a href="index.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
          <i class="fa-solid fa-grip text-base w-5"></i> Dashboard
        </a>
        <a href="leave.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium bg-blue-600 text-white">
          <i class="fa-solid fa-calendar-check text-base w-5"></i> Leave Request
        </a>
        <a href="my-leaves.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
          <i class="fa-solid fa-list-check text-base w-5"></i> My Leaves
        </a>
        <div class="my-2 border-t border-zinc-800"></div>
        <a href="rooms.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
          <i class="fa-solid fa-door-open text-base w-5"></i> Meeting Rooms
        </a>
        <a href="book-room.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
          <i class="fa-solid fa-calendar-plus text-base w-5"></i> Book Room
        </a>
        <a href="booking-dashboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
          <i class="fa-solid fa-list text-base w-5"></i> My Bookings
        </a>
      </nav>
      <div class="px-3 py-4 border-t border-zinc-800">
        <a href="#" id="logoutBtnSidebar" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-zinc-400 hover:bg-zinc-800 hover:text-zinc-100 transition-colors">
          <i class="fa-solid fa-right-from-bracket text-base w-5"></i> Sign Out
        </a>
      </div>
    </aside>

    <!-- Main Column -->
    <div class="flex flex-col flex-1 overflow-hidden">

      <!-- Header -->
      <header class="h-16 bg-white border-b border-zinc-200 flex items-center px-6 gap-4 shrink-0 shadow-sm">
        <div class="flex-1"></div>
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-xs font-bold" id="avatar"></div>
          <div class="text-left hidden sm:block">
            <p class="text-sm font-semibold text-zinc-800 leading-none" id="userName"></p>
            <p class="text-xs text-zinc-400 mt-0.5" id="userRole"></p>
          </div>
        </div>
      </header>

    <!-- Content -->
      <main class="flex-1 overflow-auto p-8">
        <div class="max-w-2xl mx-auto">

          <div class="mb-6">
            <h2 class="text-2xl font-bold text-zinc-900">Leave Request</h2>
            <p class="text-zinc-500 mt-1 text-sm">Submit your time-off application for approval.</p>
          </div>

          <!-- Form Card -->
          <div class="bg-white rounded-2xl border border-zinc-200 shadow-sm overflow-hidden">

            <!-- Skeleton Form (shown while loading) -->
            <div id="formSkeleton" class="p-8 space-y-6">
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                <div class="space-y-2">
                  <div class="h-4 w-24 bg-zinc-200 rounded animate-pulse"></div>
                  <div class="h-10 bg-zinc-100 rounded-xl"></div>
                </div>
                <div class="space-y-2">
                  <div class="h-4 w-16 bg-zinc-200 rounded animate-pulse"></div>
                  <div class="h-10 bg-zinc-100 rounded-xl"></div>
                </div>
              </div>
              <div class="space-y-2">
                <div class="h-4 w-32 bg-zinc-200 rounded animate-pulse"></div>
                <div class="h-10 bg-zinc-100 rounded-xl"></div>
              </div>
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                <div class="space-y-2">
                  <div class="h-4 w-28 bg-zinc-200 rounded animate-pulse"></div>
                  <div class="h-10 bg-zinc-100 rounded-xl"></div>
                </div>
                <div class="space-y-2">
                  <div class="h-4 w-36 bg-zinc-200 rounded animate-pulse"></div>
                  <div class="h-10 bg-zinc-100 rounded-xl"></div>
                </div>
              </div>
              <div class="space-y-2">
                <div class="h-4 w-20 bg-zinc-200 rounded animate-pulse"></div>
                <div class="h-24 bg-zinc-100 rounded-xl"></div>
              </div>
              <div class="h-10 bg-zinc-100 rounded-xl w-32"></div>
            </div>

            <!-- Real Form (hidden initially) -->
            <form id="leaveForm" class="p-8 space-y-6 hidden">
              <!-- User Info (read-only, auto-filled) -->
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                <div class="space-y-2">
                  <label class="block text-sm font-medium text-zinc-700">Full Name</label>
                  <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400">
                      <i class="fa-solid fa-user text-sm"></i>
                    </span>
                    <input type="text" id="employee_name" readonly
                      class="w-full pl-10 pr-4 py-2.5 text-sm border border-zinc-200 rounded-xl bg-zinc-50 text-zinc-600 cursor-not-allowed" />
                  </div>
                </div>

                <div class="space-y-2">
                  <label class="block text-sm font-medium text-zinc-700">Email</label>
                  <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400">
                      <i class="fa-solid fa-envelope text-sm"></i>
                    </span>
                    <input type="email" id="employee_email" readonly
                      class="w-full pl-10 pr-4 py-2.5 text-sm border border-zinc-200 rounded-xl bg-zinc-50 text-zinc-600 cursor-not-allowed" />
                  </div>
                </div>
              </div>

              <!-- Department (read-only) -->
              <div class="space-y-2">
                <label class="block text-sm font-medium text-zinc-700">Department</label>
                <div class="relative">
                  <span class="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400">
                    <i class="fa-solid fa-building text-sm"></i>
                  </span>
                  <input type="text" id="department" readonly
                    class="w-full pl-10 pr-4 py-2.5 text-sm border border-zinc-200 rounded-xl bg-zinc-50 text-zinc-600 cursor-not-allowed" />
                </div>
              </div>

              <!-- Leave Date + Days -->
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                <div class="space-y-2">
                  <label for="leave_date" class="block text-sm font-medium text-zinc-700">
                    Leave Date <span class="text-red-500">*</span>
                  </label>
                  <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400">
                      <i class="fa-solid fa-calendar text-sm"></i>
                    </span>
                    <input type="date" id="leave_date" name="leave_date" required
                      class="w-full pl-10 pr-4 py-2.5 text-sm border border-zinc-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all" />
                  </div>
                </div>

                <div class="space-y-2">
                  <label for="leave_days" class="block text-sm font-medium text-zinc-700">
                    Number of Days <span class="text-red-500">*</span>
                  </label>
                  <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400">
                      <i class="fa-solid fa-clock text-sm"></i>
                    </span>
                    <input type="number" id="leave_days" name="leave_days" required min="1" max="365" placeholder="e.g. 2"
                      class="w-full pl-10 pr-4 py-2.5 text-sm border border-zinc-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all placeholder:text-zinc-400" />
                  </div>
                </div>
              </div>

              <!-- Reason -->
              <div class="space-y-2">
                <label for="reason" class="block text-sm font-medium text-zinc-700">
                  Reason <span class="text-red-500">*</span>
                </label>
                <div class="relative">
                  <span class="absolute left-3 top-3 text-zinc-400">
                    <i class="fa-solid fa-pen text-sm"></i>
                  </span>
                  <textarea id="reason" name="reason" required rows="4"
                    placeholder="Describe your reason for leave..."
                    class="w-full pl-10 pr-4 py-2.5 text-sm border border-zinc-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all placeholder:text-zinc-400 resize-none"></textarea>
                </div>
              </div>

              <div id="errorMsg" class="hidden text-red-400 text-sm bg-red-50 border border-red-200 rounded-lg px-4 py-3"></div>
              <div id="successMsg" class="hidden text-green-400 text-sm bg-green-50 border border-green-200 rounded-lg px-4 py-3"></div>

              <div class="border-t border-zinc-100 pt-4 flex items-center justify-end gap-3">
                <a href="index.html" class="px-6 py-2.5 text-sm font-medium text-zinc-600 bg-zinc-100 hover:bg-zinc-200 rounded-xl transition-colors">Cancel</a>
                <button type="submit" id="submitBtn"
                  class="px-6 py-2.5 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-xl transition-colors flex items-center gap-2 shadow-sm">
                  <i class="fa-solid fa-paper-plane text-xs"></i> Submit Request
                </button>
              </div>
            </form>
          </div>

        </div>
      </main>

    </div>
  </div>

  <script>
    // Backend API Base URL - absolute để N8N có thể gọi
    const BACKEND_BASE_URL =
      window.location.protocol === "file:" ||
      window.location.hostname === "localhost" ||
      window.location.hostname === "127.0.0.1"
        ? "http://localhost:3001"
        : "https://approvehub.internalautomation.io.vn";
    const API_URL = BACKEND_BASE_URL + "/api";

    // N8N Webhook URLs
    const N8N_LEAVE_REQUEST_WEBHOOK =
      window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
        ? "http://localhost:5678/webhook/leave-request"
        : "https://n8n.internalautomation.io.vn/webhook/leave-request";

    const N8N_UPDATE_LEAVE_WEBHOOK =
      window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
        ? "http://localhost:5678/webhook/update-leave"
        : "https://n8n.internalautomation.io.vn/webhook/update-leave";

    // Get token
    const token = localStorage.getItem("token");

    // ── Helper: clear session & redirect to login ──
    const clearSession = () => {
      localStorage.removeItem("token");
      localStorage.removeItem("user");
      window.location.href = "login.html";
    };

    // ── INIT: Read cached user first (sync, like book-room.html), then refresh from API ──
    const init = async () => {
      // 1. Show skeleton immediately, read cached user to avoid blank form
      let user = JSON.parse(localStorage.getItem("user") || "{}");
      const roleLabels = { employee: "Employee", manager: "Manager", hr: "HR" };

      // Fill form with cached data right away (no blocking)
      document.getElementById("avatar").textContent = (user.name || "??").slice(0, 2).toUpperCase();
      document.getElementById("userName").textContent = user.name || "";
      document.getElementById("userRole").textContent = roleLabels[user.role] || "";
      document.getElementById("employee_name").value = user.name || "";
      document.getElementById("employee_email").value = user.email || "";
      document.getElementById("department").value = user.department || "";

      // 2. Verify token
      if (!token) {
        clearSession();
        return;
      }

      // 3. Refresh user from API (background, don't block form)
      try {
        const res = await fetch(`${API_URL}/auth/me`, {
          headers: { Authorization: `Bearer ${token}` },
        });
        if (!res.ok) {
          clearSession();
          return;
        }
        const me = await res.json();
        user = {
          id: me._id,
          name: me.name,
          email: me.email,
          department: me.department,
          role: me.role,
        };
        localStorage.setItem("user", JSON.stringify(user));
        localStorage.setItem("sidebar_user_cache", JSON.stringify(user));
        localStorage.setItem("sidebar_user_expiry", String(Date.now() + 60 * 60 * 1000));
        // Update UI with fresh data
        document.getElementById("avatar").textContent = (user.name || "??").slice(0, 2).toUpperCase();
        document.getElementById("userName").textContent = user.name || "";
        document.getElementById("userRole").textContent = roleLabels[user.role] || "";
        document.getElementById("employee_name").value = user.name || "";
        document.getElementById("employee_email").value = user.email || "";
        document.getElementById("department").value = user.department || "";
      } catch {
        // Network error — stick with cached data
      }

      // 4. Show form (no initSidebar needed — sidebar is static HTML)
      document.getElementById("formSkeleton").classList.add("hidden");
      document.getElementById("leaveForm").classList.remove("hidden");

      // 5. Logout handler for static sidebar
      document.getElementById("logoutBtnSidebar")?.addEventListener("click", (e) => {
        e.preventDefault();
        localStorage.removeItem("token");
        localStorage.removeItem("user");
        window.location.href = "login.html";
      });
    };
    init();

    // ── Submit form ──
    document.getElementById("leaveForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("submitBtn");
      const errorDiv = document.getElementById("errorMsg");
      const successDiv = document.getElementById("successMsg");

      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-xs"></i> Submitting...';
      errorDiv.classList.add("hidden");
      successDiv.classList.add("hidden");

      try {
        // Lấy user info từ localStorage
        const user = JSON.parse(localStorage.getItem("user") || "{}");

        // Kiểm tra mode: create hay update
        const urlParams = new URLSearchParams(window.location.search);
        const editId = urlParams.get("edit");
        const isUpdate = !!editId;

        // ── VALIDATION ──
        const leaveDateInput = document.getElementById("leave_date");
        const leaveDaysInput = document.getElementById("leave_days");
        const reasonInput = document.getElementById("reason");

        const leaveDate = new Date(leaveDateInput.value);
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        // Validate: ngày nghỉ phải >= hôm nay
        if (leaveDate < today && !isUpdate) {
          errorDiv.textContent = "Ngày nghỉ phải từ hôm nay trở đi";
          errorDiv.classList.remove("hidden");
          btn.disabled = false;
          btn.innerHTML = '<i class="fa-solid fa-paper-plane text-xs"></i> Submit Request';
          return;
        }

        // Validate: số ngày phải > 0
        const leaveDays = parseInt(leaveDaysInput.value);
        if (!leaveDays || leaveDays <= 0) {
          errorDiv.textContent = "Số ngày nghỉ phải lớn hơn 0";
          errorDiv.classList.remove("hidden");
          btn.disabled = false;
          btn.innerHTML = '<i class="fa-solid fa-paper-plane text-xs"></i> Submit Request';
          return;
        }

        // Validate: số ngày không quá 365
        if (leaveDays > 365) {
          errorDiv.textContent = "Số ngày nghỉ không được vượt quá 365 ngày";
          errorDiv.classList.remove("hidden");
          btn.disabled = false;
          btn.innerHTML = '<i class="fa-solid fa-paper-plane text-xs"></i> Submit Request';
          return;
        }

        // Validate: lý do không được để trống
        if (!reasonInput.value.trim()) {
          errorDiv.textContent = "Vui lòng nhập lý do nghỉ phép";
          errorDiv.classList.remove("hidden");
          btn.disabled = false;
          btn.innerHTML = '<i class="fa-solid fa-paper-plane text-xs"></i> Submit Request';
          return;
        }

        // Validate: lý do phải có ít nhất 5 ký tự
        if (reasonInput.value.trim().length < 5) {
          errorDiv.textContent = "Lý do nghỉ phép phải có ít nhất 5 ký tự";
          errorDiv.classList.remove("hidden");
          btn.disabled = false;
          btn.innerHTML = '<i class="fa-solid fa-paper-plane text-xs"></i> Submit Request';
          return;
        }
        // ── END VALIDATION ──

        // Chọn webhook phù hợp
        const webhookUrl = isUpdate ? N8N_UPDATE_LEAVE_WEBHOOK : N8N_LEAVE_REQUEST_WEBHOOK;

        // Dữ liệu gửi đến N8N
        const payload = {
          // User info
          employeeName: user.name || document.getElementById("employee_name").value,
          employeeEmail: user.email || document.getElementById("employee_email").value,
          department: user.department || document.getElementById("department").value,
          // Leave data
          leave_date: leaveDateInput.value,
          leave_days: leaveDays,
          reason: reasonInput.value,
          // Token để N8N gọi Backend API
          token: token,
          // Backend URL (N8N sẽ gọi vào đây để lưu DB)
          backendUrl: API_URL + "/leave"
        };

        // Nếu update, thêm leaveId
        if (isUpdate) {
          payload.leaveId = editId;
        }

        // GỬI TRỰC TIẾP ĐẾN N8N WEBHOOK (N8N là trung tâm)
        const res = await fetch(webhookUrl, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`  // N8N dùng token này để gọi Backend
          },
          body: JSON.stringify(payload),
        });

        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          errorDiv.textContent = data.message || "Submit failed";
          errorDiv.classList.remove("hidden");
          btn.disabled = false;
          btn.innerHTML = isUpdate
            ? '<i class="fa-solid fa-pen text-xs"></i> Update Request'
            : '<i class="fa-solid fa-paper-plane text-xs"></i> Submit Request';
          return;
        }

        const data = await res.json().catch(() => ({}));
        if (data.aiReviewPending) {
          successDiv.innerHTML = `<i class="fa-solid fa-robot mr-1"></i>Đơn đã được gửi! AI đang xem xét để duyệt tự động. Bạn sẽ nhận email thông báo kết quả trong vài giây.`;
        } else {
          successDiv.textContent = isUpdate
            ? "Leave request updated! Notification emails have been sent."
            : "Leave request submitted! A notification email has been sent to your manager.";
        }
        successDiv.classList.remove("hidden");
        setTimeout(() => window.location.href = "index.html", 3000);
      } catch (err) {
        errorDiv.textContent = "Cannot connect to server. Please try again.";
        errorDiv.classList.remove("hidden");
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-paper-plane text-xs"></i> Submit Request';
      }
    });
  </script>
</body>
</html>
