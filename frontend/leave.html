<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leave Request - ApproveHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body class="bg-zinc-100 font-sans">

  <div class="flex h-screen overflow-hidden">

    <!-- Sidebar (loaded via sidebar.js) -->
    <div id="appSidebar"></div>

    <!-- Main Column -->
    <div class="flex flex-col flex-1 overflow-hidden">

      <!-- Header -->
      <header class="h-16 bg-white border-b border-zinc-200 flex items-center px-6 gap-4 shrink-0 shadow-sm">
        <div class="flex-1"></div>
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-xs font-bold" id="avatar"></div>
          <div class="text-left hidden sm:block">
            <p class="text-sm font-semibold text-zinc-800 leading-none" id="userName"></p>
            <p class="text-xs text-zinc-400 mt-0.5" id="userRole"></p>
          </div>
          <button id="logoutBtn" class="ml-2 px-3 py-1.5 text-xs font-medium text-zinc-500 hover:text-zinc-800 hover:bg-zinc-100 rounded-lg transition-colors">
            <i class="fa-solid fa-right-from-bracket mr-1"></i>Sign Out
          </button>
        </div>
      </header>

      <!-- Loading overlay (shown while validating auth) -->
  <div id="loadingOverlay" class="fixed inset-0 bg-zinc-100 flex items-center justify-center z-50">
    <div class="text-center">
      <i class="fa-solid fa-spinner fa-spin text-3xl text-blue-500 mb-3"></i>
      <p class="text-sm text-zinc-400">Loading...</p>
    </div>
  </div>

  <!-- Content -->
      <main class="flex-1 overflow-auto p-8">
        <div class="max-w-2xl mx-auto">

          <div class="mb-6">
            <h2 class="text-2xl font-bold text-zinc-900">Leave Request</h2>
            <p class="text-zinc-500 mt-1 text-sm">Submit your time-off application for approval.</p>
          </div>

          <!-- Form Card -->
          <div class="bg-white rounded-2xl border border-zinc-200 shadow-sm overflow-hidden">

            <div class="px-8 py-5 border-b border-zinc-100 bg-zinc-50">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-blue-100 flex items-center justify-center">
                  <i class="fa-solid fa-calendar-days text-blue-600 text-lg"></i>
                </div>
                <div>
                  <h3 class="font-semibold text-zinc-800">New Leave Application</h3>
                  <p class="text-xs text-zinc-400 mt-0.5">
                    <span class="text-yellow-600 font-medium">≤ 3 days:</span> Manager approval only ·
                    <span class="text-red-600 font-medium">> 3 days:</span> Manager + HR approval
                  </p>
                </div>
              </div>
            </div>

            <form id="leaveForm" class="p-8 space-y-6">
              <!-- User Info (read-only, auto-filled) -->
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                <div class="space-y-2">
                  <label class="block text-sm font-medium text-zinc-700">Full Name</label>
                  <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400">
                      <i class="fa-solid fa-user text-sm"></i>
                    </span>
                    <input type="text" id="employee_name" readonly
                      class="w-full pl-10 pr-4 py-2.5 text-sm border border-zinc-200 rounded-xl bg-zinc-50 text-zinc-600 cursor-not-allowed" />
                  </div>
                </div>

                <div class="space-y-2">
                  <label class="block text-sm font-medium text-zinc-700">Email</label>
                  <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400">
                      <i class="fa-solid fa-envelope text-sm"></i>
                    </span>
                    <input type="email" id="employee_email" readonly
                      class="w-full pl-10 pr-4 py-2.5 text-sm border border-zinc-200 rounded-xl bg-zinc-50 text-zinc-600 cursor-not-allowed" />
                  </div>
                </div>
              </div>

              <!-- Department (read-only) -->
              <div class="space-y-2">
                <label class="block text-sm font-medium text-zinc-700">Department</label>
                <div class="relative">
                  <span class="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400">
                    <i class="fa-solid fa-building text-sm"></i>
                  </span>
                  <input type="text" id="department" readonly
                    class="w-full pl-10 pr-4 py-2.5 text-sm border border-zinc-200 rounded-xl bg-zinc-50 text-zinc-600 cursor-not-allowed" />
                </div>
              </div>

              <!-- Leave Date + Days -->
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                <div class="space-y-2">
                  <label for="leave_date" class="block text-sm font-medium text-zinc-700">
                    Leave Date <span class="text-red-500">*</span>
                  </label>
                  <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400">
                      <i class="fa-solid fa-calendar text-sm"></i>
                    </span>
                    <input type="date" id="leave_date" name="leave_date" required
                      class="w-full pl-10 pr-4 py-2.5 text-sm border border-zinc-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all" />
                  </div>
                </div>

                <div class="space-y-2">
                  <label for="leave_days" class="block text-sm font-medium text-zinc-700">
                    Number of Days <span class="text-red-500">*</span>
                  </label>
                  <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400">
                      <i class="fa-solid fa-clock text-sm"></i>
                    </span>
                    <input type="number" id="leave_days" name="leave_days" required min="1" max="365" placeholder="e.g. 2"
                      class="w-full pl-10 pr-4 py-2.5 text-sm border border-zinc-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all placeholder:text-zinc-400" />
                  </div>
                </div>
              </div>

              <!-- Reason -->
              <div class="space-y-2">
                <label for="reason" class="block text-sm font-medium text-zinc-700">
                  Reason <span class="text-red-500">*</span>
                </label>
                <div class="relative">
                  <span class="absolute left-3 top-3 text-zinc-400">
                    <i class="fa-solid fa-pen text-sm"></i>
                  </span>
                  <textarea id="reason" name="reason" required rows="4"
                    placeholder="Describe your reason for leave..."
                    class="w-full pl-10 pr-4 py-2.5 text-sm border border-zinc-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all placeholder:text-zinc-400 resize-none"></textarea>
                </div>
              </div>

              <div id="errorMsg" class="hidden text-red-400 text-sm bg-red-50 border border-red-200 rounded-lg px-4 py-3"></div>
              <div id="successMsg" class="hidden text-green-400 text-sm bg-green-50 border border-green-200 rounded-lg px-4 py-3"></div>

              <div class="border-t border-zinc-100 pt-4 flex items-center justify-end gap-3">
                <a href="index.html" class="px-6 py-2.5 text-sm font-medium text-zinc-600 bg-zinc-100 hover:bg-zinc-200 rounded-xl transition-colors">Cancel</a>
                <button type="submit" id="submitBtn"
                  class="px-6 py-2.5 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-xl transition-colors flex items-center gap-2 shadow-sm">
                  <i class="fa-solid fa-paper-plane text-xs"></i> Submit Request
                </button>
              </div>
            </form>
          </div>

        </div>
      </main>

    </div>
  </div>

  <script src="sidebar.js"></script>
  <script>
    const API_URL =
      window.location.protocol === "file:" ||
      window.location.hostname === "localhost" ||
      window.location.hostname === "127.0.0.1"
        ? "http://localhost:3001/api"
        : "/api";

    // ── Helper: clear session & redirect to login ──
    const clearSession = () => {
      localStorage.removeItem("token");
      localStorage.removeItem("user");
      window.location.href = "login.html";
    };

    // ── Auth: validate token via /auth/me FIRST, before rendering anything ──
    const token = localStorage.getItem("token");

    const init = async () => {
      document.getElementById("loadingOverlay").classList.add("hidden");

      if (!token) {
        clearSession();
        return;
      }

      let me;
      try {
        const res = await fetch(`${API_URL}/auth/me`, {
          headers: { Authorization: `Bearer ${token}` },
        });
        if (!res.ok) {
          clearSession();
          return;
        }
        me = await res.json();
      } catch {
        clearSession();
        return;
      }

      // ── Store fresh user data in localStorage ──
      const user = {
        id: me._id,
        name: me.name,
        email: me.email,
        department: me.department,
        role: me.role,
      };
      localStorage.setItem("user", JSON.stringify(user));

      const role = user.role || "";

      // ── Init shared sidebar ──
      initSidebar({ activePage: "leave", user });

      // ── Auto-fill header user info ──
      document.getElementById("avatar").textContent = user.name ? user.name.slice(0, 2).toUpperCase() : "??";
      document.getElementById("userName").textContent = user.name || "Guest";
      document.getElementById("userRole").textContent = { employee: "Employee", manager: "Manager", hr: "HR" }[role] || "";

      // ── Auto-fill form from verified API data ──
      document.getElementById("employee_name").value = user.name || "";
      document.getElementById("employee_email").value = user.email || "";
      document.getElementById("department").value = user.department || "";
    };

    init();

    // ── Logout (header button + sidebar fallback) ──
    document.getElementById("logoutBtn")?.addEventListener("click", (e) => {
      e.preventDefault();
      clearSession();
    });

    // ── Submit form ──
    document.getElementById("leaveForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("submitBtn");
      const errorDiv = document.getElementById("errorMsg");
      const successDiv = document.getElementById("successMsg");

      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-xs"></i> Submitting...';
      errorDiv.classList.add("hidden");
      successDiv.classList.add("hidden");

      try {
        const res = await fetch(`${API_URL}/leave`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`,
          },
          body: JSON.stringify({
            leave_date: document.getElementById("leave_date").value,
            leave_days: document.getElementById("leave_days").value,
            reason: document.getElementById("reason").value,
          }),
        });

        if (!res.ok) {
          const data = await res.json();
          errorDiv.textContent = data.message || "Submit failed";
          errorDiv.classList.remove("hidden");
          btn.disabled = false;
          btn.innerHTML = '<i class="fa-solid fa-paper-plane text-xs"></i> Submit Request';
          return;
        }

        successDiv.textContent = "Leave request submitted! A notification email has been sent to your manager.";
        successDiv.classList.remove("hidden");
        setTimeout(() => window.location.href = "index.html", 2000);
      } catch (err) {
        errorDiv.textContent = "Cannot connect to server.";
        errorDiv.classList.remove("hidden");
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-paper-plane text-xs"></i> Submit Request';
      }
    });
  </script>
