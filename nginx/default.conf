# ═══════════════════════════════════════════════════════════════════
# Nginx Reverse Proxy Config
# ─────────────────────────────────────────────────────────────────
# Routing:
#   yourdomain.com       → Frontend (port 3000)
#   api.yourdomain.com   → Backend  (port 3001)
#   n8n.yourdomain.com   → N8n      (port 5678 - chạy trên VPS)
#
# Hướng dẫn cài SSL:
#   1. Cài certbot: sudo apt install certbot python3-certbot-nginx
#   2. Chạy: sudo certbot --nginx -d yourdomain.com -d api.yourdomain.com
#   3. Certbot sẽ tự động tạo SSL config
# ═══════════════════════════════════════════════════════════════════

upstream frontend {
    server frontend:3000;
}

upstream backend {
    server backend:3001;
}

# ─────────────────────────────────────
# HTTP → HTTPS Redirect
# ─────────────────────────────────────
server {
    listen 80;
    server_name yourdomain.com api.yourdomain.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─────────────────────────────────────
# Frontend - yourdomain.com
# ─────────────────────────────────────
server {
    listen 443 ssl;
    server_name yourdomain.com;

    # SSL sẽ được cấu hình bởi certbot
    #ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    #ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # Khi chưa có SSL, dùng HTTP tạm:
    proxy_http_version 1.1;

    location / {
        proxy_pass         http://frontend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ─────────────────────────────────────
# Backend API - api.yourdomain.com
# ─────────────────────────────────────
server {
    listen 443 ssl;
    server_name api.yourdomain.com;

    # SSL sẽ được cấu hình bởi certbot
    #ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    #ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    proxy_http_version 1.1;

    location / {
        proxy_pass         http://backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
