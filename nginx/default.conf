# ─── HTTP → HTTPS ───
server {
    listen 80;
    server_name internalautomation.io.vn
               approvehub.internalautomation.io.vn
               api.internalautomation.io.vn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    return 301 https://$host$request_uri;
}

# ─── N8N ───
server {
    listen 443 ssl;
    server_name n8n.internalautomation.io.vn;

    ssl_certificate     /etc/letsencrypt/live/approvehub.internalautomation.io.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/approvehub.internalautomation.io.vn/privkey.pem;

    location / {
        proxy_pass         http://n8n:5678;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    location /websocket {
        proxy_pass         http://n8n:5678;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}

# ─── FRONTEND ───
server {
    listen 443 ssl;
    server_name approvehub.internalautomation.io.vn;

    ssl_certificate     /etc/letsencrypt/live/approvehub.internalautomation.io.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/approvehub.internalautomation.io.vn/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        proxy_pass         http://frontend:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }
}

# ─── BACKEND ───
server {
    listen 443 ssl;
    server_name api.internalautomation.io.vn;

    ssl_certificate     /etc/letsencrypt/live/approvehub.internalautomation.io.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/approvehub.internalautomation.io.vn/privkey.pem;

    location / {
        proxy_pass         http://backend:3001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 90s;
        proxy_connect_timeout 30s;
    }
}
