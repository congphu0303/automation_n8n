name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script: |
            # 1. Chuyển vào đúng thư mục chứa docker-compose.yml
            cd /root

            # 2. Cập nhật code mới nhất từ GitHub
            git pull origin main

            # 3. Build lại KHÔNG dùng cache để ép nạp code mới vào Image
            docker compose build --no-cache backend frontend

            # 4. Khởi động lại các dịch vụ
            docker compose up -d backend frontend n8n

            # 5. Khởi động lại Caddy để làm mới SSL/Config
            docker compose restart caddy